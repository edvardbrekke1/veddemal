<!DOCTYPE html>
<!-- VEDDEMÅL v1.5.0 | © 2025 Edvard Brekke. Alle rettigheter reservert. -->
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>VEDDEMÅL</title>
<meta name="theme-color" content="#00ff88">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Veddemål">
<meta name="description" content="P2P veddemål — ingen dommer, ingen server, bare deg og motparten.">
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#06060b;--surf:#0d0d16;--surf2:#13131f;--b:#1e1e2e;--b2:#2a2a3e;
  --tx:#f0f0fa;--dim:#7a7a9a;--muted:#9a9ab8;
  --g:#00ff88;--gd:#071a10;--gb:#0f3a20;
  --a:#ffaa00;--ad:#1a1100;--ab:#3a2800;
  --bl:#4499ff;--bld:#08142a;--blb:#1a3a6a;
  --r:#ff4466;--rd:#1a0612;--rb:#3a1030;
  --pu:#9966ff;--pud:#0f0a1a;--pub:#2a1a4a;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);overflow-x:hidden}
body{font-family:'DM Sans',sans-serif;color:var(--tx);-webkit-tap-highlight-color:transparent;overscroll-behavior:none}
#app{max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:84px}
.scr{padding:20px 18px 20px;animation:fi .15s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
button{cursor:pointer;border:none;font-family:'DM Sans',sans-serif;background:none;color:inherit}
input,textarea,select{font-family:'DM Sans',sans-serif;outline:none;-webkit-appearance:none;background:none}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
::-webkit-scrollbar{width:0}

/* NAV */
#nav-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;
  background:var(--surf);border-top:1px solid var(--b);display:flex;z-index:200;
  padding-bottom:env(safe-area-inset-bottom,0px)}
.nb{flex:1;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;
  gap:3px;font-size:9px;color:var(--dim);font-weight:600;letter-spacing:.7px;text-transform:uppercase;
  transition:color .15s;position:relative}
.nb.act{color:var(--g)}
.nb-ico{font-size:20px;line-height:1}
.nb-badge{position:absolute;top:5px;right:calc(50% - 18px);background:var(--r);color:#fff;
  font-size:9px;font-weight:700;min-width:16px;height:16px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;padding:0 3px}
.nb-plus{flex:1;padding:6px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:2px}
.nb-plus-ico{width:44px;height:44px;background:var(--g);border-radius:22px;display:flex;
  align-items:center;justify-content:center;font-size:26px;color:#000;margin-top:-12px;
  box-shadow:0 0 28px rgba(0,255,136,.4);transition:transform .12s;font-weight:700}
.nb-plus-ico:active{transform:scale(.9)}
.nb-plus-lbl{font-size:9px;font-weight:600;color:var(--dim);letter-spacing:.7px}

/* NOTIF AREA */
#notif-area{position:fixed;top:env(safe-area-inset-top,0);left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;z-index:300;pointer-events:none;padding:8px 14px 0}
.notif-banner{background:var(--surf2);border:1px solid var(--b2);border-radius:12px;
  padding:12px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;
  pointer-events:all;cursor:pointer;animation:slideDown .2s ease;box-shadow:0 4px 20px rgba(0,0,0,.5)}
@keyframes slideDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:none}}
.notif-banner.fade-out{animation:slideUp .2s ease forwards}
@keyframes slideUp{to{opacity:0;transform:translateY(-20px)}}

/* HEADER */
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:4px;line-height:1}
.logo em{color:var(--g);font-style:normal}
.conn-pill{font-size:11px;padding:5px 12px;border-radius:20px;display:flex;align-items:center;gap:6px;font-weight:500}
.conn-on{background:var(--gd);border:1px solid var(--gb);color:var(--g)}
.conn-off{background:var(--surf2);border:1px solid var(--b);color:var(--dim)}
.pulse{width:7px;height:7px;border-radius:50%;background:var(--g);animation:pu 1.8s infinite;flex-shrink:0}
@keyframes pu{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}

/* TOP BAR */
.tbar{display:flex;align-items:center;gap:10px;margin-bottom:22px}
.back-btn{display:flex;align-items:center;gap:5px;color:var(--tx);font-size:14px;font-weight:600;
  padding:10px 14px;background:var(--surf2);border:1px solid var(--b2);border-radius:10px;
  white-space:nowrap;transition:border-color .12s;flex-shrink:0}
.back-btn::before{content:'←';font-size:16px}
.back-btn:active{border-color:var(--b)}
.pg-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:18px}
.stat{background:var(--surf);border:1px solid var(--b);border-radius:12px;padding:12px 8px;text-align:center}
.stat-n{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;line-height:1.1}
.stat-l{font-size:11px;color:var(--muted);margin-top:3px;letter-spacing:1px;text-transform:uppercase;font-weight:600}
.sg .stat-n{color:var(--g)}.sa .stat-n{color:var(--a)}.sb .stat-n{color:var(--bl)}

/* TICKER */
.ticker{background:var(--surf);border:1px solid var(--b);border-radius:10px;
  padding:10px 14px;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.tick-dot{width:8px;height:8px;border-radius:50%;background:var(--g);animation:pu 1.4s infinite;flex-shrink:0}
.tick-tx{font-size:12px;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tick-t{font-size:10px;color:var(--g);font-weight:600;flex-shrink:0}

/* CHIPS */
.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px;-webkit-overflow-scrolling:touch}
.chip{padding:7px 14px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap;
  border:1px solid var(--b);color:var(--muted);background:var(--surf);transition:all .15s;flex-shrink:0}
.chip.act{background:var(--gd);border-color:var(--gb);color:var(--g)}

/* CARDS */
.card{background:var(--surf);border:1px solid var(--b);border-radius:14px;padding:16px;margin-bottom:10px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.cj::before{background:linear-gradient(90deg,var(--a),transparent)}
.ch::before{background:linear-gradient(90deg,var(--g),transparent)}
.cp::before{background:linear-gradient(90deg,var(--bl),transparent)}
.cl::before{background:linear-gradient(90deg,var(--pu),transparent)}
.card-tap{cursor:pointer;transition:border-color .12s}
.card-tap:active{border-color:var(--b2)}
.card-desc{font-size:14px;font-weight:500;color:var(--tx);line-height:1.5;margin-bottom:12px}
.pool-bar{background:var(--surf2);border-radius:20px;height:8px;margin:10px 0 6px;overflow:hidden}
.pool-fill{height:100%;background:linear-gradient(90deg,var(--g),var(--bl));border-radius:20px}
.pool-lbl{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);font-weight:500}

/* BADGES */
.badge{font-size:10px;padding:4px 9px;border-radius:20px;white-space:nowrap;font-weight:700}
.b-blue{background:var(--bld);border:1px solid var(--blb);color:var(--bl)}
.b-green{background:var(--gd);border:1px solid var(--gb);color:var(--g)}
.b-orange{background:var(--ad);border:1px solid var(--ab);color:var(--a)}
.b-red{background:var(--rd);border:1px solid var(--rb);color:var(--r)}
.b-gray{background:var(--surf2);border:1px solid var(--b2);color:var(--muted)}
.b-lock{background:#1a0a2a;border:1px solid #4a1a7a;color:#cc88ff}

/* ALERT ROWS */
.alert{border-radius:11px;padding:12px 16px;margin-bottom:10px;display:flex;
  justify-content:space-between;align-items:center;cursor:pointer;font-size:13px;font-weight:600}
.alert-g{background:var(--gd);border:1px solid var(--gb);color:var(--g)}
.alert-a{background:var(--ad);border:1px solid var(--ab);color:var(--a)}

/* FORM */
.field{margin-bottom:18px}
.flbl{font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:8px;display:block;font-weight:600}
.fi{width:100%;background:var(--surf2);border:1px solid var(--b2);border-radius:11px;
  color:var(--tx);font-size:15px;padding:13px 15px;display:block;transition:border-color .15s}
.fi:focus{border-color:var(--g)}
textarea.fi{resize:none;line-height:1.6}
select.fi{cursor:pointer}
.fi-row{display:flex;gap:7px;flex-wrap:wrap}
.fi-chip{flex:1;min-width:60px;padding:11px 6px;background:var(--surf2);border:1px solid var(--b2);
  border-radius:10px;font-size:13px;font-weight:600;color:var(--muted);text-align:center;cursor:pointer;transition:all .15s}
.fi-chip.act{background:var(--gd);border-color:var(--gb);color:var(--g)}

/* TYPE GRID */
.type-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px}
.type-card{background:var(--surf2);border:1px solid var(--b2);border-radius:12px;padding:14px 8px;text-align:center;cursor:pointer;transition:all .15s}
.type-card.act{border-color:var(--gb);background:var(--gd)}
.type-ico{font-size:24px;margin-bottom:6px}
.type-name{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase}
.type-card.act .type-name{color:var(--g)}
.type-desc{font-size:10px;color:var(--dim);margin-top:4px;line-height:1.4}

/* VIS MODE CARDS */
.vis-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.vis-card{background:var(--surf2);border:2px solid var(--b2);border-radius:14px;padding:18px 14px;text-align:center;cursor:pointer;transition:all .15s}
.vis-card.act{border-color:var(--gb);background:var(--gd)}
.vis-card.act-lock{border-color:#4a1a7a;background:#1a0a2a}
.vis-ico{font-size:32px;margin-bottom:10px}
.vis-name{font-size:14px;font-weight:700;color:var(--muted);margin-bottom:6px}
.vis-card.act .vis-name{color:var(--g)}
.vis-card.act-lock .vis-name{color:#cc88ff}
.vis-desc{font-size:11px;color:var(--dim);line-height:1.5}

/* STEPS */
.steps-bar{display:flex;gap:5px;margin-bottom:24px}
.step-dot{flex:1;height:3px;border-radius:2px;background:var(--b2)}
.step-dot.act{background:var(--g)}

/* BUTTONS */
.btn{padding:14px 18px;border-radius:12px;font-size:14px;font-weight:700;letter-spacing:.2px;
  transition:all .12s;display:block;text-align:center}
.btn-full{width:100%;margin-top:10px}
.btn-prim{background:var(--g);color:#000}
.btn-prim:disabled{opacity:.25;cursor:not-allowed}
.btn-prim:active:not(:disabled){opacity:.85}
.btn-sec{background:var(--surf2);border:1px solid var(--b2);color:var(--tx)}
.btn-sec:active{opacity:.75}
.btn-acc{background:var(--gd);border:1px solid var(--gb);color:var(--g);flex:1}
.btn-acc:active{opacity:.75}
.btn-dec{background:var(--rd);border:1px solid var(--rb);color:var(--r);flex:1}
.btn-dec:active{opacity:.75}
.btn-ghost{width:100%;border:1px solid var(--b2);color:var(--muted);margin-top:8px}
.btn-ghost:hover{border-color:var(--muted);color:var(--tx)}
.btn-row{display:flex;gap:8px;margin-top:10px}
.btn-danger{background:var(--rd);border:1px solid var(--rb);color:var(--r)}
.btn-danger:active{opacity:.75}

/* INFO BOXES */
.info-box{font-size:12px;color:var(--muted);line-height:1.8;background:var(--surf);border:1px solid var(--b);border-radius:11px;padding:14px 16px;margin-bottom:16px}
.info-box strong{color:var(--tx)}
.warn-box{font-size:12px;color:var(--a);line-height:1.8;background:var(--ad);border:1px solid var(--ab);border-radius:11px;padding:14px 16px;margin-bottom:16px}
.tip-box{font-size:12px;color:var(--bl);line-height:1.8;background:var(--bld);border:1px solid var(--blb);border-radius:11px;padding:14px 16px;margin-bottom:16px}
.divider{height:1px;background:var(--b);margin:14px 0}

/* DATA ROWS */
.drow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--b);font-size:13px;color:var(--muted)}
.drow:last-child{border-bottom:none}
.drow .dval{color:var(--tx);font-weight:500;text-align:right;max-width:60%}
.dval-g{color:var(--g)!important}

/* AVATAR */
.av{width:40px;height:40px;border-radius:20px;background:var(--surf2);display:flex;align-items:center;
  justify-content:center;font-size:15px;font-weight:700;color:var(--tx);flex-shrink:0;
  text-transform:uppercase;border:1px solid var(--b)}
.av-g{background:var(--gd);color:var(--g);border-color:var(--gb)}
.av-pu{background:var(--pud);color:var(--pu);border-color:var(--pub)}

/* PERSON ROW */
.prow{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--b);cursor:pointer}
.prow:last-child{border-bottom:none}
.prow-name{font-size:14px;font-weight:600;color:var(--tx);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prow-sub{font-size:11px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* STARS */
.stars{display:flex;gap:8px;margin:10px 0}
.star-btn{font-size:32px;color:var(--b2);background:none;border:none;cursor:pointer;transition:color .1s,transform .1s}
.star-btn.act{color:var(--a)}
.star-btn:active{transform:scale(1.2)}
/* RATING CARD */
.rating-item{background:var(--surf2);border:1px solid var(--b);border-radius:10px;padding:13px;margin-bottom:8px}
.rating-stars{font-size:15px;color:var(--a);margin-bottom:5px}
.rating-comment{font-size:13px;color:var(--tx);line-height:1.5;margin-bottom:6px}
.rating-meta{font-size:11px;color:var(--dim)}

/* PROFILE */
.profile-card{background:var(--surf);border:1px solid var(--b);border-radius:16px;padding:22px;margin-bottom:16px;text-align:center}
.profile-av{width:68px;height:68px;border-radius:34px;background:var(--gd);display:flex;align-items:center;
  justify-content:center;font-size:28px;font-weight:700;color:var(--g);margin:0 auto 14px;border:2px solid var(--gb)}
.profile-name{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px}
.profile-id{font-size:11px;color:var(--dim);letter-spacing:1px;font-family:monospace;margin-top:4px}
.profile-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:18px}
.ps{background:var(--surf2);border-radius:10px;padding:12px 8px;text-align:center}
.ps-n{font-family:'Bebas Neue',sans-serif;font-size:22px}
.ps-l{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px;font-weight:600}

/* LEADERBOARD */
.lb-row{display:flex;align-items:center;gap:12px;background:var(--surf);border:1px solid var(--b);border-radius:12px;padding:13px 15px;margin-bottom:8px;cursor:pointer}
.lb-row.act{border-color:var(--gb);background:var(--gd)}
.lb-rank{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--dim);width:28px;text-align:center}
.r1{color:#ffd700}.r2{color:#c0c0c0}.r3{color:#cd7f32}

/* CHAT */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 220px);min-height:300px}
.chat-msgs{flex:1;overflow-y:auto;padding:4px 0;display:flex;flex-direction:column;gap:8px}
.chat-msg{max-width:82%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.5}
.msg-me{background:var(--gd);border:1px solid var(--gb);color:var(--g);align-self:flex-end;border-bottom-right-radius:4px}
.msg-other{background:var(--surf2);border:1px solid var(--b);color:var(--tx);align-self:flex-start;border-bottom-left-radius:4px}
.msg-sys{background:none;border:1px dashed var(--b2);color:var(--muted);align-self:center;font-size:11px;text-align:center;max-width:90%;padding:8px 14px}
.msg-name{font-size:10px;font-weight:700;margin-bottom:3px;color:var(--dim)}
.msg-time{font-size:10px;color:var(--dim);margin-top:3px;text-align:right}
.chat-input-row{display:flex;gap:8px;padding-top:12px;border-top:1px solid var(--b);margin-top:auto}
.chat-in{flex:1;background:var(--surf2);border:1px solid var(--b2);border-radius:22px;
  color:var(--tx);font-size:14px;padding:11px 16px}
.chat-in:focus{border-color:var(--g)}
.chat-send{width:44px;height:44px;border-radius:22px;background:var(--g);color:#000;
  font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.chat-send:active{opacity:.8}

/* INVITE SELECT */
.invite-item{display:flex;align-items:center;gap:12px;padding:12px;background:var(--surf2);
  border:1px solid var(--b);border-radius:11px;margin-bottom:8px;cursor:pointer;transition:border-color .12s}
.invite-item.sel{border-color:var(--gb);background:var(--gd)}
.invite-check{width:22px;height:22px;border-radius:11px;border:2px solid var(--b2);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;transition:all .12s}
.invite-item.sel .invite-check{background:var(--g);border-color:var(--g);color:#000}

/* MISC */
.section-label{font-size:10px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;font-weight:700;margin-bottom:10px;display:block}
.id-display{background:var(--surf2);border:1px solid var(--b2);border-radius:11px;padding:14px;font-family:monospace;font-size:12px;color:var(--g);letter-spacing:1px;word-break:break-all;text-align:center;margin-bottom:10px}
.streak-pill{display:inline-flex;align-items:center;gap:7px;background:var(--ad);border:1px solid var(--ab);border-radius:20px;padding:7px 16px;font-size:13px;color:var(--a);font-weight:700;margin-bottom:16px}
.verdict-result{text-align:center;padding:28px 0}
.verdict-ico{font-size:56px;margin-bottom:12px;animation:fi .3s ease}
.verdict-n{font-family:'Bebas Neue',sans-serif;font-size:40px;letter-spacing:3px}
.verdict-s{font-size:13px;color:var(--muted);margin-top:6px;line-height:1.6}
.never-paid{background:#1a0800;border:2px solid var(--r);border-radius:10px;padding:8px 14px;font-size:11px;color:var(--r);font-weight:700;display:inline-flex;align-items:center;gap:6px}
.timer-n{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--a)}
.ob-wrap{padding:40px 24px 30px}
.ob-logo{font-family:'Bebas Neue',sans-serif;font-size:54px;letter-spacing:6px;text-align:center;line-height:1;margin-bottom:6px}
.ob-sub{font-size:10px;letter-spacing:3px;color:var(--dim);text-align:center;margin-bottom:44px;font-weight:600}
.ob-feat{display:flex;align-items:flex-start;gap:14px;margin-bottom:18px}
.ob-feat-ico{font-size:22px;flex-shrink:0;margin-top:1px}
.ob-feat-t{font-size:14px;font-weight:600;color:var(--tx);margin-bottom:3px}
.ob-feat-d{font-size:12px;color:var(--muted);line-height:1.6}
.empty{text-align:center;padding:32px 20px}
.empty-ico{font-size:36px;margin-bottom:12px}
.empty-tx{font-size:14px;color:var(--muted);line-height:1.8}

/* DONATE */
.donate-box{background:linear-gradient(135deg,#0a1a10,#0d1520);border:1px solid var(--gb);border-radius:14px;padding:20px;margin-top:16px;text-align:center}
.donate-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--g);margin-bottom:6px}
.donate-msg{font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:16px}
.donate-amts{display:flex;gap:6px;justify-content:center;margin-bottom:14px;flex-wrap:wrap}
.donate-amt{padding:8px 14px;border-radius:20px;font-size:13px;font-weight:700;border:1px solid var(--b2);
  color:var(--muted);background:var(--surf2);cursor:pointer;transition:all .15s}

function showPrompt(title,defaultVal,callback){
  const oid='sp'+Date.now();
  const el=document.createElement('div');
  el.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
  el.innerHTML=`<div style="background:var(--surf2);border:1px solid var(--b2);border-radius:20px;padding:24px;width:100%;max-width:380px">
    <div style="font-size:15px;font-weight:600;margin-bottom:16px">${esc(title)}</div>
    <input id="${oid}" class="fi" style="width:100%;margin-bottom:16px" value="${esc(defaultVal||'')}">
    <div style="display:flex;gap:8px">
      <button class="btn btn-sec" style="flex:1" onclick="this.closest('[style*=fixed]').remove()">${t('cancel')}</button>
      <button class="btn btn-prim" style="flex:1" id="${oid}-ok">OK</button>
    </div>
  </div>`;
  document.body.appendChild(el);
  const inp=document.getElementById(oid);
  inp.focus();inp.select();
  const ok=()=>{const v=inp.value;el.remove();callback(v);};
  document.getElementById(oid+'-ok').addEventListener('click',ok);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')ok();if(e.key==='Escape')el.remove();});
  el.addEventListener('click',e=>{if(e.target===el)el.remove();});
}
function showCopyModal(title,value){

  el.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';

function loadState(){
  const jp=(k,d)=>{try{const v=ls(k);return v?JSON.parse(v):JSON.parse(d);}catch(e){console.warn('[loadState] corrupt key',k,e);return JSON.parse(d);}};
  A.myName=ls('vName')||'';
  A.myVipps=ls('vVipps')||'';
  A.lang=ls('vLang')||'en';
  A.myBets=jp('vBets','[]');if(!Array.isArray(A.myBets))A.myBets=[];
  A.betChats=jp('vBChat','{}');if(!A.betChats||typeof A.betChats!=='object'||Array.isArray(A.betChats))A.betChats={};
  A.dms=jp('vDM','{}');if(!A.dms||typeof A.dms!=='object'||Array.isArray(A.dms))A.dms={};
  A.groupChats=jp('vGC','[]');if(!Array.isArray(A.groupChats))A.groupChats=[];
  A.contacts=jp('vContacts','[]');if(!Array.isArray(A.contacts))A.contacts=[];
  A.blocked=new Set(jp('vBlocked','[]'));
  A.ratings=jp('vRatings','{}');if(!A.ratings||typeof A.ratings!=='object'||Array.isArray(A.ratings))A.ratings={};
  A.activity=jp('vAct','[]');if(!Array.isArray(A.activity))A.activity=[];
  A.offlineQ=jp('vOffQ','[]');if(!Array.isArray(A.offlineQ))A.offlineQ=[];
  A.relayQ=jp('vRelayQ','[]');if(!Array.isArray(A.relayQ))A.relayQ=[];
  // Migrate old relayQ items to new schema (adds mid, attempt fields, forwardedTo; drops unused status field)
  A.relayQ=A.relayQ.map(r=>{const n=now();return{mid:r.mid||r.id,id:r.id,to:r.to,from:r.from,msg:r.msg,ts:r.ts||n,expiresAt:r.expiresAt||(n+RELAY_TTL),attemptCount:r.attemptCount||0,lastAttemptAt:r.lastAttemptAt||0,nextAttemptAt:r.nextAttemptAt||0,forwardedTo:r.forwardedTo||[]};}).filter(r=>r.id&&r.to&&r.msg);
  A._seenMids=new Set(jp('vSeenMids','[]'));
  A._seenAcks=new Set(jp('vSeenAcks','[]'));
  A.wins=parseInt(ls('vWins')||'0');
  A.streak=parseInt(ls('vStreak')||'0');
  A.rated=new Set(jp('vRated','[]'));
  A._donDismissed=new Set(jp('vDon','[]'));
  // Restore received bets (openBets); drop expired ones
  const rawOB=jp('vOpenBets','[]');
  A.openBets=new Map((Array.isArray(rawOB)?rawOB:[]).filter(([,b])=>!b.expiresAt||b.expiresAt>Date.now()));
  A.filter='*';
  // Peer memory: restore cached peer info so search works offline
  const rawPC=jp('vPeerCache','[]');
  if(Array.isArray(rawPC))rawPC.forEach(p=>{if(p.id&&p.id!==A.myId)A.peers.set(p.id,{...p,online:false});});
}

function persist(){
  const _ss=(k,v)=>{try{ss(k,v);}catch(e){
    console.error('[persist]',k,e);
    if((e.name==='QuotaExceededError'||e.code===22)&&!persist._warned){
      persist._warned=true;setTimeout(()=>{persist._warned=false;},30000);
      notify('⚠️ Lagring mislyktes','Lagringsplass full – slett gamle veddemål for å frigjøre plass.');
    }
  }};
  _ss('vBets',JSON.stringify(A.myBets));
  _ss('vBChat',JSON.stringify(A.betChats));
  _ss('vDM',JSON.stringify(A.dms));
  _ss('vGC',JSON.stringify(A.groupChats));
  _ss('vContacts',JSON.stringify(A.contacts));
  _ss('vBlocked',JSON.stringify([...A.blocked]));
  _ss('vRatings',JSON.stringify(A.ratings));
  _ss('vAct',JSON.stringify(A.activity.slice(0,200)));
  _ss('vOffQ',JSON.stringify(A.offlineQ.slice(0,100)));
  _ss('vDon',JSON.stringify([...A._donDismissed]));
  _ss('vOpenBets',JSON.stringify([...A.openBets.entries()].slice(0,200)));
  _ss('vRated',JSON.stringify([...A.rated]));
  _ss('vRelayQ',JSON.stringify(A.relayQ.slice(0,RELAY_MAX)));
  _ss('vSeenMids',JSON.stringify([...A._seenMids].slice(-500)));
  _ss('vSeenAcks',JSON.stringify([...A._seenAcks].slice(-500)));
  // Peer memory: save cached peer info for offline search/display (max 200, most recent first)
  _ss('vPeerCache',JSON.stringify([...A.peers.values()].filter(p=>p.id&&p.id!==A.myId&&p.name).map(p=>({id:p.id,name:p.name,wins:p.wins||0,bets:p.bets||0,pr:p.pr||null,lastSeen:p.ts||now()})).sort((a,b)=>(b.lastSeen||0)-(a.lastSeen||0)).slice(0,200)));
}

// CRYPTO
// ════════════════════════════════════════════════
async function initCrypto(){
  const sp=ls('vPriv'),sb=ls('vPub');
  if(sp&&sb){
    try{
      A.privKey=await crypto.subtle.importKey('pkcs8',b64ab(sp),{name:'ECDSA',namedCurve:'P-256'},false,['sign']);
      A.pubKey=await crypto.subtle.importKey('raw',b64ab(sb),{name:'ECDSA',namedCurve:'P-256'},true,['verify']);
      A.pubB64=sb;
      const h=await crypto.subtle.digest('SHA-256',b64ab(sb));
      A.myId='v'+ab64(h).replace(/[^a-zA-Z0-9]/g,'').substr(0,14);
    }catch(e){await genKeys();}
  }else{await genKeys();}
  const ep=ls('vEPriv'),eb=ls('vEPub');
  if(ep&&eb){
    try{
      A.ecdhPriv=await crypto.subtle.importKey('pkcs8',b64ab(ep),{name:'ECDH',namedCurve:'P-256'},false,['deriveKey']);
      A.ecdhPubB64=eb;
      // Load or regenerate ECDH signature
      A.ecdhSig=ls('vESig')||'';
      if(!A.ecdhSig&&A.privKey){
        const sig=await crypto.subtle.sign({name:'ECDSA',hash:'SHA-256'},A.privKey,b64ab(eb));
        A.ecdhSig=ab64(sig);ss('vESig',A.ecdhSig);
      }
    }catch(e){await genECDH();}
  }else{await genECDH();}
  ss('vId',A.myId);
}
async function genKeys(){
  try{
    const kp=await crypto.subtle.generateKey({name:'ECDSA',namedCurve:'P-256'},true,['sign','verify']);
    A.privKey=kp.privateKey;A.pubKey=kp.publicKey;
    const pr=await crypto.subtle.exportKey('pkcs8',kp.privateKey);
    const pu=await crypto.subtle.exportKey('raw',kp.publicKey);
    A.pubB64=ab64(pu);ss('vPriv',ab64(pr));ss('vPub',ab64(pu));
    const h=await crypto.subtle.digest('SHA-256',pu);
    A.myId='v'+ab64(h).replace(/[^a-zA-Z0-9]/g,'').substr(0,14);
  }catch(e){console.error('[genKeys]',e);throw e;}
}
async function genECDH(){
  try{
    const kp=await crypto.subtle.generateKey({name:'ECDH',namedCurve:'P-256'},true,['deriveKey']);
    A.ecdhPriv=kp.privateKey;
    const pu=await crypto.subtle.exportKey('raw',kp.publicKey);
    A.ecdhPubB64=ab64(pu);
    ss('vEPriv',ab64(await crypto.subtle.exportKey('pkcs8',kp.privateKey)));
    ss('vEPub',A.ecdhPubB64);
    // SECURITY FIX: Sign ECDH pubkey with ECDSA to bind identity
    if(A.privKey){
      const sig=await crypto.subtle.sign({name:'ECDSA',hash:'SHA-256'},A.privKey,pu);
      A.ecdhSig=ab64(sig);
      ss('vESig',A.ecdhSig);
    }
  }catch(e){console.error('[genECDH]',e);throw e;}
}
async function verifyECDHSig(pubB64,epubB64,esig){
  // Verify that ECDH pubkey was signed by the ECDSA identity key
  if(!pubB64||!epubB64||!esig)return false;
  try{
    const pk=await crypto.subtle.importKey('raw',b64ab(pubB64),{name:'ECDSA',namedCurve:'P-256'},true,['verify']);
    return await crypto.subtle.verify({name:'ECDSA',hash:'SHA-256'},pk,b64ab(esig),b64ab(epubB64));
  }catch(e){return false;}
}
async function deriveShared(epub){
  if(A.sharedKeys.has(epub))return A.sharedKeys.get(epub);
  const pk=await crypto.subtle.importKey('raw',b64ab(epub),{name:'ECDH',namedCurve:'P-256'},false,[]);
  const sk=await crypto.subtle.deriveKey({name:'ECDH',public:pk},A.ecdhPriv,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);
  A.sharedKeys.set(epub,sk);return sk;
}
async function encryptFor(text,epub){
  try{const sk=await deriveShared(epub);const iv=crypto.getRandomValues(new Uint8Array(12));const enc=await crypto.subtle.encrypt({name:'AES-GCM',iv},sk,new TextEncoder().encode(text));return ab64(iv.buffer)+'.'+ab64(enc);}catch(e){console.error('[SEC] Encryption failed:',e);return null;}
}
async function decryptFrom(cipher,epub){
  try{
    if(!cipher||!cipher.includes('.'))return '[⚠️ '+t('decrypt_fail')+']';
    const[a,b]=cipher.split('.');if(!a||!b)return '[⚠️ '+t('decrypt_fail')+']';
    const sk=await deriveShared(epub);const dec=await crypto.subtle.decrypt({name:'AES-GCM',iv:new Uint8Array(b64ab(a))},sk,b64ab(b));return new TextDecoder().decode(dec);
  }catch(e){return '[⚠️ '+t('decrypt_fail')+']';}
}
async function signData(data){
  try{
    const sig=await crypto.subtle.sign({name:'ECDSA',hash:'SHA-256'},A.privKey,new TextEncoder().encode(JSON.stringify(data)));
    return ab64(sig);
  }catch(e){console.error('[SEC] signData failed:',e);return '';}
}
async function verifyGossipSig(msg){
  try{
    const pk=await crypto.subtle.importKey('raw',b64ab(msg.pub),{name:'ECDSA',namedCurve:'P-256'},true,['verify']);
    const data=JSON.stringify({id:msg.id,origin:msg.origin,p:msg.p});
    return await crypto.subtle.verify({name:'ECDSA',hash:'SHA-256'},pk,b64ab(msg.sig),new TextEncoder().encode(data));
  }catch(e){return false;}
}

// ════════════════════════════════════════════════
// PEER / GOSSIP
// ════════════════════════════════════════════════
const MAX_CONN=15,TTL=8;
// SECURITY FIX: Rate limit gossip per peer (max 30 msgs per 10 sec)
const _gossipRates=new Map();
function checkGossipRate(peerId){
  const now_=Date.now();const r=_gossipRates.get(peerId)||{count:0,reset:now_+10000};
  if(now_>r.reset){r.count=0;r.reset=now_+10000;}
  r.count++;_gossipRates.set(peerId,r);
  return r.count<=30;
}
function myPresence(){return{id:A.myId,name:A.myName,vipps:A.myVipps,pub:A.pubB64,epub:A.ecdhPubB64,esig:A.ecdhSig||'',wins:A.wins,bets:(A.myBets||[]).length,ts:now(),pr:avgRating(A.myId,false),jr:avgRating(A.myId,true),cids:(A.contacts||[]).map(c=>c.id)};}

const RECONNECT_BACKOFF=[2000,5000,15000,30000,60000];
function schedReconnect(){
  if(A._reconnectTimer||A.ready||!A.peer||A.peer.destroyed)return;
  const step=Math.min(A._reconnectStep||0,RECONNECT_BACKOFF.length-1);
  A._reconnectStep=(A._reconnectStep||0)+1;
  console.log('[peer] schedReconnect step',A._reconnectStep,'delay',RECONNECT_BACKOFF[step]+'ms');
  A._reconnectTimer=setTimeout(()=>{
    A._reconnectTimer=null;
    if(A.ready)return;
    // After 3 failed soft reconnects, destroy peer and create fresh connection
    if(A._reconnectStep>3||!A.peer||A.peer.destroyed){
      console.log('[peer] full reinit (step',A._reconnectStep,')');
      A._reconnectStep=0;
      try{if(A.peer&&!A.peer.destroyed)A.peer.destroy();}catch(e){}
      initPeer();
      return;
    }
    console.log('[peer] soft reconnect attempt',A._reconnectStep);
    try{A.peer.reconnect();}catch(e){console.warn('[peer] reconnect threw',e);}
    // Safety: always schedule next attempt — open handler cancels if reconnect succeeds
    schedReconnect();
  },RECONNECT_BACKOFF[step]);
}
function initPeer(){
  A._peerGen=(A._peerGen||0)+1;
  const gen=A._peerGen;
  console.log('[peer] initPeer gen',gen);
  A.peer=new Peer(A.myId,{
    host:'veddemal-peer.onrender.com',
    port:443,
    path:'/',
    secure:true,
    debug:0
  });
  A.peer.on('open',()=>{
    if(gen!==A._peerGen){console.log('[peer] stale open ignored (gen',gen,'cur',A._peerGen,')');return;}
    console.log('[peer] open — A.ready=true');
    A.ready=true;A._idRetry=0;
    clearTimeout(A._reconnectTimer);A._reconnectTimer=null;A._reconnectStep=0;
    schedRender();
    window.location.hash.replace('#','').split(',').filter(p=>p.startsWith('v')&&p!==A.myId).forEach(tryConn);
    A.peers.forEach((_,id)=>tryConn(id));
    flushQ();
    // Bug 3 fix: clear any stacked interval before creating a new one
    clearInterval(A._hiInterval);
    A._hiInterval=setInterval(()=>{try{if(A.conns.size)broadcast({t:'HI',...myPresence()});A.contacts.forEach(c=>tryConn(c.id));flushQ();}catch(e){console.error('[HI interval]',e);}},10000);
  });
  A.peer.on('error',e=>{
    if(gen!==A._peerGen){console.log('[peer] stale error ignored (gen',gen,')');return;}
    console.log('[peer] error —',e.type,e.message||e);
    if(e.type==='unavailable-id'){
      // SECURITY FIX: Never delete private key — that destroys identity permanently.
      // Instead retry with exponential backoff. Someone else may have hijacked our ID temporarily.
      A._idRetry=(A._idRetry||1)*2;
      const delay=Math.min(A._idRetry*1000,60000);
      console.warn(`[SEC] Peer ID taken. Retrying in ${delay}ms. DO NOT regenerate keys.`);
      notify('⚠️ '+t('id_conflict_title'),t('id_conflict_msg'));
      setTimeout(()=>{try{A.peer.destroy();}catch(e){}initPeer();},delay);
      return;
    }
    // Non-fatal errors: don't kill connection status
    if(e.type==='peer-unavailable'){
      console.log('[peer] target peer offline (non-fatal)');
      return;
    }
    A.ready=false;schedRender();schedReconnect();
  });
  A.peer.on('connection',c=>setupConn(c));
  A.peer.on('disconnected',()=>{
    if(gen!==A._peerGen){console.log('[peer] stale disconnected ignored (gen',gen,')');return;}
    console.log('[peer] disconnected — A.ready=false');
    A.ready=false;schedRender();schedReconnect();
  });
  A.peer.on('close',()=>{
    if(gen!==A._peerGen)return;
    console.log('[peer] close — peer destroyed');
    A.ready=false;schedRender();
  });
}

function tryConn(id){
  if(!A.peer||A.peer.destroyed||id===A.myId||A.conns.get(id)?.open||A.conns.size>=MAX_CONN||A.blocked.has(id))return;
  if(!A.ready){schedReconnect();return;}// peer disconnected — ensure signaling recovery is scheduled
  try{setupConn(A.peer.connect(id,{reliable:true,serialization:'json'}));}catch(e){}
}
function setupConn(conn){
  conn.on('open',()=>{
    try{
    A.conns.set(conn.peer,conn);
    conn.send({t:'HI',...myPresence()});
    deliverRelay(conn.peer);
    offerRelayToHelper(conn.peer); // Phase 5: offer stored relay items to new helper
    syncWithPeer(conn.peer);
    schedRender();updateBadges();
    }catch(e){console.error('[setupConn open]',e);}
  });
  conn.on('data',m=>onData(conn.peer,m));
  conn.on('close',()=>{
    A.conns.delete(conn.peer);
    const p=A.peers.get(conn.peer);
    if(p){
      // Bug 4 fix: grace period before marking offline to avoid blinking on short drops
      if(p._offlineTimer)clearTimeout(p._offlineTimer);
      p._offlineTimer=setTimeout(()=>{
        if(!A.conns.get(conn.peer)?.open){p.online=false;p._offlineTimer=null;schedRender();}
      },8000);
    }
    schedRender();
  });
  conn.on('error',()=>{A.conns.delete(conn.peer);schedRender();});
}
function send(id,msg){
  const c=A.conns.get(id);
  if(c?.open){try{c.send(msg);return;}catch(e){console.warn('[send fallback]',id,e);}}// send failed — fall through to offlineQ
  if(A.offlineQ.length>=100)A.offlineQ.shift(); // dropp eldste hvis full
  // Generate relay mid upfront so offlineQ and relayQ share the same id for A2 cleanup
  const relayMid=RELAY_TYPES.has(msg.t)?uid():null;
  A.offlineQ.push({to:id,msg,ts:now(),mid:relayMid});persist();
  if(relayMid)relayMsg(id,msg,relayMid);
  tryConn(id);setTimeout(()=>flushQ(),500);setTimeout(()=>flushQ(),2000);setTimeout(()=>flushQ(),5000);
}
function broadcast(msg){A.conns.forEach((c,id)=>{if(c.open&&id!==msg.from)try{c.send(msg);}catch(e){console.warn('[broadcast]',id,e);}});}
function gossip(payload,ttl){
  const msg={t:'GS',id:uid(),ttl:ttl||TTL,from:A.myId,origin:A.myId,pub:A.pubB64,p:payload};
  // SECURITY FIX: Sign gossip payload
  signData({id:msg.id,origin:msg.origin,p:payload}).then(sig=>{
    msg.sig=sig;
    A.seen.add(msg.id);applyGossip(payload);broadcast(msg);
  }).catch(e=>console.error('[gossip]',e));
}
function flushQ(){
  try{
    const keep=[];
    A.offlineQ.forEach(item=>{
      if(now()-item.ts>604800000)return; // 7 dager TTL
      const c=A.conns.get(item.to);
      if(c?.open){try{c.send(item.msg);}catch(e){keep.push(item);}}else{keep.push(item);tryConn(item.to);}
    });
    A.offlineQ=keep;persist();
  }catch(e){console.error('[flushQ]',e);}
}

// ════════════════════════════════════════════════
// RELAY — store-and-forward for offline contacts
// ════════════════════════════════════════════════
const RELAY_TYPES=new Set(['INV','HC','WV','PC','PA','PFV','BM','GCI','GCM','DM','JR','JY','JN','PJ','GM']);
const RELAY_TTL=7776000000; // 90 days
const RELAY_MAX=200;
// Exponential backoff steps (ms): 0s, 30s, 2m, 10m, 30m
const RELAY_BACKOFF=[0,30000,120000,600000,1800000];
const RELAY_MAX_HELPERS=2; // max helper copies per relay item (Phase 5)
function relayNextAttempt(n){return RELAY_BACKOFF[Math.min(n,RELAY_BACKOFF.length-1)];}

function addToRelayQ(item){
  if(!item.id||!item.to||!item.msg)return;
  if(item.to===A.myId)return;
  // Dedup by stable mid (preferred) or rid (fallback)
  const mid=item.mid||item.id;
  if(A.relayQ.find(r=>(r.mid&&r.mid===mid)||(r.id===item.id)))return;
  const n=now();
  A.relayQ.push({mid,id:item.id,to:item.to,from:item.from,msg:item.msg,ts:item.ts||n,expiresAt:item.expiresAt||(n+RELAY_TTL),attemptCount:0,lastAttemptAt:0,nextAttemptAt:0,forwardedTo:[]});
  console.log('[relay-store] stored mid',mid,'for',item.to,'from',item.from);
  if(A.relayQ.length>RELAY_MAX)A.relayQ.splice(0,A.relayQ.length-RELAY_MAX);
}
function pruneRelayQ(){
  const n=now();
  const before=A.relayQ.length;
  A.relayQ=A.relayQ.filter(r=>r.expiresAt>n);
  if(A.relayQ.length<before)console.log('[relay-prune] removed',before-A.relayQ.length,'items, remaining',A.relayQ.length);
}
function deliverRelay(peerId){
  const conn=A.conns.get(peerId);if(!conn?.open)return;
  const n=now();
  let changed=false;
  A.relayQ.forEach(item=>{
    if(item.to!==peerId||item.expiresAt<=n)return;
    if(item.nextAttemptAt>n)return; // respect backoff
    try{
      conn.send({t:'RR',mid:item.mid,rid:item.id,to:item.to,msg:item.msg,from:item.from,originalFrom:item.from,finalTo:item.to,ts:item.ts,expiresAt:item.expiresAt});
      // Update attempt tracking — do NOT remove; only ACK removes
      item.attemptCount=(item.attemptCount||0)+1;
      item.lastAttemptAt=n;
      item.nextAttemptAt=n+relayNextAttempt(item.attemptCount);
      changed=true;
      console.log('[relay-send] attempt',item.attemptCount,'mid',item.mid,'to',peerId);
    }catch(e){console.warn('[relay-send] failed mid',item.mid||item.id,e);}
  });
  if(changed)persist();
}
// Phase 5: offer pending relay items to a newly connected trusted contact acting as helper
function offerRelayToHelper(helperId){
  const conn=A.conns.get(helperId);if(!conn?.open)return;
  if(!A.contacts.find(c=>c.id===helperId))return;
  const n=now();let changed=false;
  A.relayQ.forEach(item=>{
    if(item.from!==A.myId)return; // only offer items we originated
    if(item.to===helperId||item.expiresAt<=n)return; // skip: already the intended recipient, or expired
    if(!item.forwardedTo)item.forwardedTo=[];
    if(item.forwardedTo.includes(helperId))return; // already offered
    if(item.forwardedTo.length>=RELAY_MAX_HELPERS)return; // max copies reached
    try{
      conn.send({t:'RR',mid:item.mid,rid:item.id,to:item.to,msg:item.msg,from:item.from,originalFrom:item.from,finalTo:item.to,ts:item.ts,expiresAt:item.expiresAt});
      item.forwardedTo.push(helperId);changed=true;
      console.log('[relay-send] helper-offer mid',item.mid,'via',helperId,'for target',item.to);
    }catch(e){console.warn('[relay-send] helper-offer failed',helperId,e);}
  });
  if(changed)persist();
}
function relayMsg(toId,msg,existingMid){
  if(!A.myId||!toId||!msg)return;
  if(!RELAY_TYPES.has(msg.t))return;
  const mid=existingMid||uid();const rid=uid();const ts=now();const expiresAt=ts+RELAY_TTL;
  // Store locally — ensures final recipient connecting later gets delivery, and helpers get it via offerRelayToHelper
  addToRelayQ({mid,id:rid,to:toId,from:A.myId,msg,ts,expiresAt});
  // Forward immediately to any currently-connected contacts
  A.conns.forEach((conn,cid)=>{
    if(cid===toId||cid===A.myId||!conn.open)return;
    if(!A.contacts.find(c=>c.id===cid))return; // only relay through contacts
    try{
      conn.send({t:'RR',mid,rid,to:toId,msg,from:A.myId,originalFrom:A.myId,finalTo:toId,ts,expiresAt});
      // Track helper so offerRelayToHelper skips them
      const stored=A.relayQ.find(r=>r.mid===mid);
      if(stored&&!stored.forwardedTo.includes(cid))stored.forwardedTo.push(cid);
      console.log('[relay-send] forwarded mid',mid,'via helper',cid,'to target',toId);
    }catch(e){}
  });
  persist();
}

function syncWithPeer(id){
  const conn=A.conns.get(id);if(!conn?.open)return;
  // 1. Re-send my open bets (public + private if this peer was invited)
  A.myBets.filter(b=>b.status==='open'&&(!b.isPrivate||(b.invitedIds&&b.invitedIds.includes(id)))).forEach(b=>{
    try{conn.send({t:'INV',bet:{...b,fromContact:true}});}catch(e){}
  });
  // 2. Honor bet status sync
  const syncBets=A.myBets
    .filter(b=>b.opponentId===id&&b.type==='honor'&&['active','await_payment','done'].includes(b.status))
    .map(b=>({id:b.id,status:b.status,myConfirm:b.myConfirm,winnerId:b.winnerId,winnerName:b.winnerName,payDeadline:b.payDeadline}));
  if(syncBets.length)try{conn.send({t:'BS',bets:syncBets});}catch(e){}
  // 2b. Re-send HC if I've confirmed but peer may have missed it
  A.myBets.filter(b=>b.type==='honor'&&b.opponentId===id&&b.status==='active'&&b.myConfirm)
    .forEach(b=>{try{conn.send({t:'HC',bid:b.id,wId:b.myConfirm});}catch(e){}});
  // 2c. Re-send WV if I've already shared Vipps and bet is still in await_payment (1v1 and pool)
  A.myBets.filter(b=>b.vippsShared&&b.status==='await_payment'&&(b.opponentId===id||(b.type==='pool'&&b.members?.find(x=>x.id===id))))
    .forEach(b=>{try{conn.send({t:'WV',bid:b.id,vipps:A.myVipps});}catch(e){}});
  // 2d. Re-send latest game state for active games where opponent needs it
  A.myBets.filter(b=>b.gameType&&!b.gameFinished&&b.opponentId===id)
    .forEach(b=>{if(b.gameState)try{conn.send({t:'GM',bid:b.id,state:b.gameState,turn:b.gameTurn,finished:false,winnerId:null,scores:null,_mid:uid(),ts:now()});}catch(e){}});
  // 3. Pool verdict sync — creator re-sends personalized PFV for missed members
  A.myBets.filter(b=>b.type==='pool'&&b.creatorId===A.myId
    &&['active','await_payment','done'].includes(b.status)
    &&b.members?.find(m=>m.id===id)).forEach(b=>{
      // Re-send PA if bet is active (member may have missed it)
      if(b.status==='active'){
        const memberList=[{id:b.creatorId,name:b.creatorName,side:b.creatorSide,vipps:b.creatorVipps||''},...(b.members||[])];
        try{conn.send({t:'PA',bid:b.id,memberList});}catch(e){}
      }
      // Re-send personalized PFV if verdict already declared
      if(['await_payment','done'].includes(b.status)&&b.winningSide){
        const payments=computePoolPayments(b,b.winningSide);
        const myPayments=payments.filter(p=>p.from===id||p.to===id);
        const memberList=[{id:b.creatorId,name:b.creatorName,side:b.creatorSide,vipps:b.creatorVipps||''},...(b.members||[])];
        try{conn.send({t:'PFV',bid:b.id,side:b.winningSide,payDeadline:b.payDeadline,memberList,myPayments});}catch(e){}
      }
    });
  // 4. Pool join re-register — joiner re-sends PJ if still pending
  A.myBets.filter(b=>b.type==='pool'&&b.isChallenger&&b.status==='pending'&&b.opponentId===id)
    .forEach(b=>{try{conn.send({t:'PJ',bid:b.id,name:A.myName,side:b.side,amt:b.amount,vipps:A.myVipps});}catch(e){}});
  // 5. Flush offline queue for this peer
  flushQ();
  // 6. Deliver queued relay items for this peer
  deliverRelay(id);
}
window.syncAll=()=>{
  if(!A.myName)return;
  A.contacts.forEach(c=>{tryConn(c.id);});
  setTimeout(()=>{A.conns.forEach((_,id)=>{deliverRelay(id);offerRelayToHelper(id);syncWithPeer(id);});flushQ();},800);
  notify('🔄 '+t('sync_done'));
};
// Part E: add a pool participant as a contact and attempt connection
window.addPoolMember=(id,name)=>{
  if(!id||A.contacts.find(c=>c.id===id))return;
  const resolvedName=name||A.peers.get(id)?.name||id.substr(0,12);
  A.contacts.push({id,name:resolvedName,alias:resolvedName});
  persist();tryConn(id);notify('👋 '+t('add_id_ok'));render(true);
};
// Phase 6: relay debug helper — call window.debugRelay() or window.debugRelay(mid) in DevTools
window.debugRelay=(mid)=>{
  if(!mid)return{relayQ:A.relayQ.map(r=>({mid:r.mid,to:r.to,from:r.from,attempts:r.attemptCount,nextIn:r.nextAttemptAt?Math.round((r.nextAttemptAt-now())/1000)+'s':'-',forwardedTo:r.forwardedTo,expiresIn:Math.round((r.expiresAt-now())/3600000)+'h'})),offlineQ:A.offlineQ.map(i=>({to:i.to,t:i.msg?.t,mid:i.mid||null})),seenMids:A._seenMids.size,seenAcks:A._seenAcks.size};
  return{mid,relay:A.relayQ.filter(r=>r.mid===mid),offline:A.offlineQ.filter(i=>i.mid===mid),seenMid:A._seenMids.has('r:'+mid),seenAck:A._seenAcks.has('a:'+mid)};
};

function onData(from,m){
  try{
  if(!m||A.blocked.has(from))return;
  if(m.t==='HI'){
    const ex=A.peers.get(from)||{};
    // SECURITY FIX: Hold epub until ECDH signature verified — prevents race where unverified key is used for DM encryption
    const needsEpubVerif=m.epub&&m.pub&&m.esig;
    const changed=!ex.name||ex.online!==true||ex.wins!==m.wins;
    A.peers.set(from,{...ex,id:from,name:m.name,vipps:m.vipps,pub:m.pub,epub:needsEpubVerif?ex.epub||null:m.epub,esig:m.esig,wins:m.wins||0,bets:m.bets||0,online:true,ts:m.ts,pr:m.pr,jr:m.jr,epubVerified:needsEpubVerif?ex.epubVerified:undefined});
    if(needsEpubVerif){
      verifyECDHSig(m.pub,m.epub,m.esig).then(valid=>{
        const p=A.peers.get(from);
        if(p){
          p.epubVerified=valid;
          if(valid){p.epub=m.epub;}
          else{console.warn(`[SEC] Peer ${from}: ECDH signature INVALID — possible MITM`);p.epub=null;}
        }
      });
    }
    // Update contact name if peer changed their display name
    if(m.name){const _c=A.contacts.find(c=>c.id===from);if(_c&&_c.name!==m.name){if(_c.alias===_c.name)_c.alias=m.name;_c.name=m.name;persist();}}
    // AUTO-ADD: if they have me in their contacts, add them to mine
    if(m.cids&&m.cids.includes(A.myId)&&!A.contacts.find(c=>c.id===from)){
      A.contacts.push({id:from,name:m.name||from.substr(0,12),alias:m.name||from.substr(0,12)});
      // Share my open bets with this new contact immediately
      const conn=A.conns.get(from);
      if(conn?.open){
        A.myBets.filter(b=>b.status==='open'&&!b.isPrivate).forEach(b=>{
          try{conn.send({t:'INV',bet:{...b,fromContact:true}});}catch(e){console.warn('[HI auto-add INV]',e);}
        });
      }
      addAct(`${A.lang==='en'?'New friend:':'Ny venn:'} ${m.name||from.substr(0,8)}`,'👋');
      persist();
    }
    if(!ex.name){
      try{A.conns.get(from)?.send({t:'HI',...myPresence()});}catch(e){console.warn('[HI reply]',e);}
      // First HI from this peer: share open bets if they're a contact
      if(A.contacts.find(c=>c.id===from)){
        const conn=A.conns.get(from);
        if(conn?.open){
          A.myBets.filter(b=>b.status==='open'&&!b.isPrivate).forEach(b=>{
            try{conn.send({t:'INV',bet:{...b,fromContact:true}});}catch(e){console.warn('[HI first INV]',e);}
          });
        }
      }
    }
    flushQ();if(changed)schedRender();
    // Debounced peer cache save (avoid saving on every HI, batch per 30s)
    if(!A._peerCacheTimer){A._peerCacheTimer=setTimeout(()=>{A._peerCacheTimer=null;try{ss('vPeerCache',JSON.stringify([...A.peers.values()].filter(p=>p.id&&p.id!==A.myId&&p.name).map(p=>({id:p.id,name:p.name,wins:p.wins||0,bets:p.bets||0,pr:p.pr||null,lastSeen:p.ts||now()})).sort((a,b)=>(b.lastSeen||0)-(a.lastSeen||0)).slice(0,200)));}catch(e){}},30000);}
    return;
  }
  if(m.t==='GS'){
    if(A.seen.has(m.id))return;
    // SECURITY FIX: Rate limit gossip per peer
    if(!checkGossipRate(from)){console.warn(`[SEC] Gossip rate limit hit for ${from}`);return;}
    A.seen.add(m.id);
    if(A.seen.size>3000){const it=A.seen.values();for(let i=0;i<300;i++)A.seen.delete(it.next().value);}
    // SECURITY FIX: Verify gossip signature if available
    if(m.sig&&m.pub&&m.origin){
      verifyGossipSig(m).then(valid=>{
        if(valid){applyGossip(m.p);}
        else{console.warn(`[SEC] Invalid gossip signature from origin ${m.origin}`);}
      });
    } else {
      // Legacy unsigned gossip — accept but log
      applyGossip(m.p);
    }
    if(m.ttl>0){const f={...m,ttl:m.ttl-1};A.conns.forEach((c,id)=>{if(c.open&&id!==from)try{c.send(f);}catch(e){console.warn('[gossip relay]',id,e);}});}
    return;
  }
  handleDirect(from,m);
  }catch(e){console.error('[onData]',m?.t,e);}
}

function applyGossip(p){
  if(!p)return;
  // BET intentionally NOT processed from gossip — bets only come via direct INV to contacts
  if(p.t==='TAKE'||p.t==='CANCEL'){A.openBets.delete(p.betId);schedRender();}
  if(p.t==='ACT'){addAct(p.text,p.ico);schedRender();}
  if(p.t==='RAT'&&p.uid&&p.ratings){
    if(!A.ratings[p.uid])A.ratings[p.uid]=[];
    p.ratings.forEach(r=>{if(!A.ratings[p.uid].find(x=>x.betId===r.betId&&x.ts===r.ts))A.ratings[p.uid].push(r);});
    persist();
  }
  if(p.t==='UPD'&&p.version&&p.version!==APP_VERSION){
    const safeUrl=(typeof p.url==='string'&&p.url.startsWith('https://'))?p.url:UPDATE_URL+'/';
    if(isNewerVersion(p.version,APP_VERSION)&&ls('vUpdDismissed')!==p.version){A._updateAvailable={version:p.version,message:p.message||'',url:safeUrl};schedRender();}
  }
}
function isNewerVersion(remote,local){
  const r=remote.split('.').map(Number),l=local.split('.').map(Number);
  for(let i=0;i<3;i++){if((r[i]||0)>(l[i]||0))return true;if((r[i]||0)<(l[i]||0))return false;}
  return false;
}
async function checkForUpdate(){
  if(!UPDATE_URL)return;
  try{
    const ctrl=new AbortController();const tid=setTimeout(()=>ctrl.abort(),5000);
    const res=await fetch(UPDATE_URL+'/version.json',{signal:ctrl.signal,cache:'no-cache'});
    clearTimeout(tid);
    if(!res.ok)return;
    const data=await res.json();
    if(data?.version&&isNewerVersion(data.version,APP_VERSION)&&ls('vUpdDismissed')!==data.version){
      const safeUrl=(typeof data.url==='string'&&data.url.startsWith('https://'))?data.url:UPDATE_URL+'/';
      A._updateAvailable={version:data.version,message:data.message||'',url:safeUrl};
      schedRender();
    }
  }catch(e){/* silent — update check never affects app */}
}

function handleDirect(from,m){
  switch(m.t){
    // PRIVATE BET INVITE
    case 'INV':{
      // SECURITY: validate externally-controlled IDs before storage — they are used raw in onclick attributes
      if(!m.bet?.id||!/^[a-zA-Z0-9_-]{1,50}$/.test(m.bet.id))break;
      if(!m.bet.creatorId||!/^v[a-zA-Z0-9]{1,20}$/.test(m.bet.creatorId))break;
      if(!['honor','pool'].includes(m.bet.type))break;
      if(m.bet&&!A.myBets.find(b=>b.id===m.bet.id)&&!A.openBets.has(m.bet.id)){
        if(!A.blocked.has(m.bet.creatorId)){
          if(!m.bet.expiresAt||m.bet.expiresAt>now()){
            A.openBets.set(m.bet.id,{...m.bet,isFromContact:true});
            if(!A.contacts.find(c=>c.id===m.bet.creatorId)){
              A.contacts.push({id:m.bet.creatorId,name:m.bet.creatorName||m.bet.creatorId.substr(0,12),alias:m.bet.creatorName||m.bet.creatorId.substr(0,12)});
            }
            notify('📩 '+m.bet.creatorName,m.bet.desc?.substr(0,50),()=>go('joinBet',{betId:m.bet.id}));
            A.unreadChat++;updateBadges();schedRender(); // kun render ved nytt bet
          }
        }
      }break;
    }
    // JOIN REQUEST
    case 'JR':{
      const b=A.myBets.find(x=>x.id===m.bid);
      if(b&&['open','accepting'].includes(b.status)){
        if(!b.interests)b.interests=[];
        if(!b.interests.find(x=>x.id===from))b.interests.push({id:from,name:m.name,vipps:m.vipps,side:m.side||null,ts:now()});
        b.status='accepting';
        addAct(`${m.name||'?'} ${t('sys_interested')}`,'⚡');
        notify('⚡ Ny interesse!',`${m.name} ${t('challenger_d')}`,()=>go('betDetail',{betId:m.bid}));
        A.unreadChat++;persist();
      }else if(b&&!['open','accepting'].includes(b.status)){
        // Bet er tatt/avsluttet — informer senderen med JN, med mindre de allerede er member
        const alreadyMember=b.members?.find(x=>x.id===from);
        if(!alreadyMember)send(from,{t:'JN',bid:m.bid});
      }
      schedRender();break;
    }
    // JOIN YES
    case 'JY':{
      const b=A.myBets.find(x=>x.id===m.bid);
      if(b&&b.status==='pending'){b.opponentId=from;b.opponentName=m.name;b.opponentVipps=m.vipps;b.status='active';addAct(`${m.name||'?'} ${A.lang==='en'?'accepted your bet':'aksepterte veddemålet ditt'}: ${(b.desc||'').substr(0,30)}`,'✅');notify('✅ '+t('n_bet_accepted'),m.name,()=>go('betDetail',{betId:m.bid}));persist();}schedRender();break;
    }
    case 'JN':{
      const b=A.myBets.find(x=>x.id===m.bid);
      if(b&&b.isChallenger)b.status='declined';
      persist();schedRender();break;
    }
    case 'HC':{if(!m.bid||!m.wId)break;const b=A.myBets.find(x=>x.id===m.bid);if(b){b.theirConfirm=m.wId;checkHonor(b);notify('🤝 '+t('honor_claim'),esc(b.opponentName||'?'),()=>go('betDetail',{betId:m.bid}));}persist();render(true);break;}
    case 'NP':{
      const b=A.myBets.find(x=>x.id===m.bid);if(b)b.status='never_paid';
      if(!A.ratings[A.myId])A.ratings[A.myId]=[];
      if(!A.ratings[A.myId].find(x=>x.betId===m.bid&&x.neverPaid))
        A.ratings[A.myId].push({score:1,comment:'Betalte aldri.',betId:m.bid,raterName:b?.opponentName||A.peers.get(from)?.name||from.substr(0,8),ts:now(),neverPaid:true,isJudge:false});
      gossip({t:'RAT',uid:A.myId,ratings:A.ratings[A.myId]});
      persist();schedRender();break;
    }
    // CHAT
    case 'BM':{
      if(!m.bid||!m.text)break;
      const _bmb=A.myBets.find(x=>x.id===m.bid);
      if(!_bmb||(_bmb.creatorId!==from&&_bmb.opponentId!==from&&!_bmb.members?.find(x=>x.id===from)&&!_bmb.memberList?.find(x=>x.id===from)))break;
      if(m._mid){if(A._seenMids.has(m._mid))break;A._seenMids.add(m._mid);if(A._seenMids.size>1000)A._seenMids=new Set([...A._seenMids].slice(-500));}
      addBetMsg(m.bid,{from,name:m.name||'?',text:m.text,ts:m.ts||now()});
      if(A.screen!=='betChat'||A.params.betId!==m.bid){notify('💬 '+(m.name||'?'),m.text,()=>go('betChat',{betId:m.bid}));A.unreadChat++;}
      persist();if(A.screen==='betChat'&&A.params.betId===m.bid)schedRender();break;
    }
    // PAYMENT CONFIRMED (motpart bekrefter mottatt betaling)
    case 'PC':{
      const b=A.myBets.find(x=>x.id===m.bid);
      if(b&&b.status!=='done'){b.status='done';addAct(`${A.lang==='en'?'Payment confirmed for':'Betaling bekreftet for'} ${(b.desc||'').substr(0,30)}`,'💰');}
      persist();schedRender();break;
    }
    // POOL JOIN — creator mottar nye members
    case 'PJ':{
      const b=A.myBets.find(x=>x.id===m.bid);
      if(b&&b.creatorId===A.myId){
        if(!b.members)b.members=[];
        if(!b.members.find(x=>x.id===from)){
          // Enforce maxPerSide if set
          if(b.maxPerSide){
            const creatorOnSide=b.creatorSide===m.side?1:0;
            const sideCount=b.members.filter(x=>x.side===m.side).length+creatorOnSide;
            if(sideCount>=b.maxPerSide){send(from,{t:'JN',bid:m.bid});break;}
          }
          b.members.push({id:from,name:m.name,side:m.side,amt:m.amt,vipps:m.vipps||''});
          notify('👥 '+esc(m.name||'?'),(A.lang==='en'?'joined the group bet':'ble med i gruppe-veddemålet'),()=>go('betDetail',{betId:m.bid}));
        }
      }
      persist();schedRender();break;
    }
    // POOL ACTIVATE — creator sends when bet goes live
    case 'PA':{
      const b=A.myBets.find(x=>x.id===m.bid);
      if(b&&b.status==='pending'){
        b.status='active';
        if(m.memberList)b.memberList=m.memberList;
        notify('🏁 '+t('n_pool_started'),b.desc,()=>go('betDetail',{betId:m.bid}));
        // Part E Feature 2: suggest adding missing pool participants to contacts
        if(m.memberList&&m.memberList.length){
          const missing=m.memberList.filter(p=>p.id&&p.id!==A.myId&&!A.contacts.find(c=>c.id===p.id));
          if(missing.length){
            setTimeout(()=>{
              if(confirm(t('pool_sync_prompt').replace('{n}',missing.length))){
                missing.forEach(p=>addPoolMember(p.id,p.name));
                notify('👥 '+t('pool_add_all_done'));
              }
            },1800);
          }
        }
      }
      persist();schedRender();break;
    }
    // POOL FINAL VERDICT — creator sends winning side + payment instructions
    case 'PFV':{
      const RANK={active:0,await_payment:1,done:2};
      const b=A.myBets.find(x=>x.id===m.bid);
      if(b){
        const localRank=RANK[b.status]??-1;
        const remoteRank=RANK['await_payment']??-1;
        if(remoteRank>localRank){
          b.status='await_payment';b.winningSide=m.side;
          b.payDeadline=m.payDeadline||now()+172800000;
          if(m.myPayments)b.payPairs=m.myPayments;
          if(m.memberList)b.memberList=m.memberList;
          const iWon=b.side===m.side||(b.creatorId===A.myId&&b.creatorSide===m.side);
          if(iWon){A.wins++;A.streak++;ss('vWins',A.wins);ss('vStreak',A.streak);
            notify('🏆 '+t('n_your_side_won'),b.desc,()=>go('betDetail',{betId:m.bid}));}
          else{A.streak=0;ss('vStreak','0');
            notify('😔 '+t('n_your_side_lost'),b.desc,()=>go('betDetail',{betId:m.bid}));}
        }
      }
      persist();schedRender();break;
    }
    case 'SDA':{if(m.bid&&A.betChats[m.bid]){delete A.betChats[m.bid];delete A.betChats[m.bid+'_delReq'];}persist();schedRender();break;}
    // DM — direct message (encrypted)
    case 'DM':{
      if(m._mid){if(A._seenMids.has(m._mid))break;A._seenMids.add(m._mid);if(A._seenMids.size>1000)A._seenMids=new Set([...A._seenMids].slice(-500));}
      const text=m.enc?null:m.text;
      const decrypted=m.enc?decryptFrom(m.text,A.peers.get(from)?.epub):null;
      if(m.enc){
        decrypted.then(pt=>{
          addDM(from,{from,name:m.name,text:pt,ts:m.ts||now()});
          if(A.screen!=='dm'||A.params.peerId!==from){
            notify('✉️ '+m.name,pt?.substr?pt.substr(0,40):t('n_encrypted_msg'),()=>go('dm',{peerId:from}));
            A.unreadChat++;updateBadges();
          }
          persist();schedRender();
        });
      }else{
        addDM(from,{from,name:m.name,text:m.text,ts:m.ts||now()});
        if(A.screen!=='dm'||A.params.peerId!==from){
          notify('✉️ '+m.name,m.text?.substr?m.text.substr(0,40):'',()=>go('dm',{peerId:from}));
          A.unreadChat++;updateBadges();
        }
        persist();schedRender();
      }
      break;
    }
    // GROUP CHAT MESSAGE
    case 'GCM':{
      if(!m.gcId||!m.text)break;
      if(m._mid){if(A._seenMids.has(m._mid))break;A._seenMids.add(m._mid);if(A._seenMids.size>1000)A._seenMids=new Set([...A._seenMids].slice(-500));}
      const gc=A.groupChats.find(g=>g.id===m.gcId);
      if(!gc||!gc.members?.includes(from))break;
      gc.msgs=gc.msgs||[];gc.msgs.push({from,name:m.name||'?',text:m.text,ts:m.ts||now()});if(gc.msgs.length>300)gc.msgs.shift();A.unreadChat++;notify('💬 '+(m.name||'?'),m.text?.substr(0,40)||'',()=>go('groupChat',{gcId:m.gcId}));
      persist();if(A.screen==='groupChat'&&A.params.gcId===m.gcId)schedRender();break;
    }
    // GROUP CHAT INVITE
    case 'GCI':{
      if(!m.gc?.id||!/^[a-zA-Z0-9_-]{1,50}$/.test(m.gc.id))break; // SECURITY: validate gc.id before storage — used raw in onclick attrs
      if(!A.groupChats.find(g=>g.id===m.gc.id)){A.groupChats.push({...m.gc,msgs:[]});notify('👥 '+t('n_new_group_chat'),m.gc.name,()=>go('groupChat',{gcId:m.gc.id}));persist();schedRender();}
      break;
    }
    // CHAT DELETE REQUEST
    case 'SD':{if(m.bid){A.betChats[m.bid+'_delReq']=from;}persist();schedRender();break;}
    // WINNER VIPPS INFO
    case 'WV':{const b=A.myBets.find(x=>x.id===m.bid);if(b){b.winnerVipps=m.vipps;persist();schedRender();}break;}
    // BET SYNC — fix stuck bets when one party missed an HC or PC message
    case 'BS':{
      const RANK={active:0,await_payment:1,done:2};
      let changed=false;
      (m.bets||[]).forEach(rb=>{
        // Only apply from the actual opponent — ignore if bet not found or peer mismatch
        const b=A.myBets.find(x=>x.id===rb.id&&x.opponentId===from);
        if(!b)return;
        const localRank=RANK[b.status]??-1;
        const remoteRank=RANK[rb.status]??-1;
        if(remoteRank<=localRank)return; // already equal or ahead — nothing to do
        // Apply missing theirConfirm and re-run checkHonor (handles active→await_payment)
        if(rb.myConfirm&&!b.theirConfirm){b.theirConfirm=rb.myConfirm;checkHonor(b);}
        // Force-apply if still behind (handles await_payment→done when PC was lost)
        if((RANK[b.status]??-1)<remoteRank){
          b.status=rb.status;
          if(rb.winnerId&&!b.winnerId){b.winnerId=rb.winnerId;b.winnerName=rb.winnerName;}
          if(rb.payDeadline&&!b.payDeadline)b.payDeadline=rb.payDeadline;
        }
        changed=true;
      });
      if(changed){persist();render(true);}
      break;
    }
    // RELAY — store-and-forward envelope
    case 'RR':{
      if(!m.to||!m.msg)break;
      if(!RELAY_TYPES.has(m.msg.t))break;
      const rrMid=m.mid||(m.rid||null);
      if(m.to===A.myId){
        // We are the final recipient — deduplicate, check blocked, handle, ACK
        const rrOriginalFrom=m.originalFrom||m.from||from;
        const isDup=rrMid&&A._seenMids.has('r:'+rrMid);
        const isBlocked=A.blocked.has(rrOriginalFrom); // SECURITY: check against real sender, not relay node
        if(!isDup&&!isBlocked){
          if(rrMid){A._seenMids.add('r:'+rrMid);if(A._seenMids.size>1000)A._seenMids=new Set([...A._seenMids].slice(-500));}
          handleDirect(rrOriginalFrom,m.msg);
        }else if(rrMid&&isDup){console.log('[relay-dedup] duplicate RR mid',rrMid,'from',from);}
        // Always send ACK so relay nodes can clean up (even for dups/blocked)
        if(rrMid){
          const ack={t:'RA',mid:rrMid,finalTo:A.myId,originalFrom:rrOriginalFrom};
          A.conns.forEach((conn,cid)=>{if(conn.open)try{conn.send(ack);}catch(e){} });
        }
        break;
      }
      // We are a relay node — only store for known contacts
      if(!A.contacts.find(c=>c.id===m.to))break;
      const relayRid=m.rid||uid();
      addToRelayQ({mid:rrMid||relayRid,id:relayRid,to:m.to,msg:m.msg,from:m.originalFrom||m.from||from,ts:m.ts||now(),expiresAt:m.expiresAt||(now()+RELAY_TTL)});
      deliverRelay(m.to); // attempt immediate delivery if target is already connected
      persist();
      break;
    }
    // RELAY ACK — final delivery confirmation
    case 'RA':{
      // Relay ACK lifecycle: pending → removed-on-RA (no 'acked' state; items are deleted, not marked)
      if(!m.mid)break;
      // Guard against ACK storms
      const ackKey='a:'+m.mid;
      if(A._seenAcks.has(ackKey))break;
      A._seenAcks.add(ackKey);
      if(A._seenAcks.size>500)A._seenAcks=new Set([...A._seenAcks].slice(-300));
      // Remove all relay items matching this mid
      const before=A.relayQ.length;
      A.relayQ=A.relayQ.filter(r=>r.mid!==m.mid);
      const ackChanged=A.relayQ.length<before;
      // A2: also remove matching offlineQ items (same mid = same logical message)
      const oqBefore=A.offlineQ.length;
      A.offlineQ=A.offlineQ.filter(item=>item.mid!==m.mid);
      const oqChanged=A.offlineQ.length<oqBefore;
      console.log('[relay-ack] mid',m.mid,'relayQ removed',before-A.relayQ.length,'offlineQ removed',oqBefore-A.offlineQ.length);
      // Forward RA toward originalFrom if they are a connected contact
      const origId=m.originalFrom;
      if(origId&&origId!==A.myId){
        const origConn=A.conns.get(origId);
        if(origConn?.open)try{origConn.send({t:'RA',mid:m.mid,finalTo:m.finalTo,originalFrom:origId});}catch(e){}
      }
      if(ackChanged||oqChanged)persist();
      break;
    }
    // GAME MOVE — generic turn-based game action
    case 'GM':{
      if(!m.bid)break;
      if(m._mid){if(A._seenMids.has(m._mid))break;A._seenMids.add(m._mid);if(A._seenMids.size>1000)A._seenMids=new Set([...A._seenMids].slice(-500));}
      const gb=A.myBets.find(x=>x.id===m.bid);
      if(!gb)break;
      // Init game session fields on first GM (opponent started the game)
      if(m.gameType&&!gb.gameType){gb.gameType=m.gameType;gb.gameSeed=m.seed||'';gb.gameFinished=false;}
      // Update generic game session fields on bet
      if(m.state!==undefined)gb.gameState=m.state;
      if(m.turn)gb.gameTurn=m.turn;
      if(m.finished){
        gb.gameFinished=true;
        gb.gameWinnerId=m.winnerId||null;
        gb.gameScores=m.scores||null;
        // Auto-resolve honor bet: both players' deterministic games reach same winner
        if(gb.type==='honor'&&m.winnerId&&gb.opponentId){
          gb.myConfirm=m.winnerId;
          send(gb.opponentId,{t:'HC',bid:m.bid,wId:m.winnerId});
          checkHonor(gb);
        }
      }
      persist();
      // Forward to game runner if game screen is open for this bet
      if(A.screen==='game'&&A.params.betId===m.bid&&typeof _gameRemoteAction==='function'){
        _gameRemoteAction(m.action,from,m.state);
        break; // _gameRemoteAction handles its own render
      }
      schedRender();
      break;
    }
  }
}

function checkHonor(bet){
  if(bet.status!=='active')return; // idempotency guard — never double-count wins
  if(bet.myConfirm&&bet.theirConfirm){
    if(bet.myConfirm===bet.theirConfirm){
      bet.status='await_payment';bet.winnerId=bet.myConfirm;
      bet.winnerName=bet.myConfirm===A.myId?A.myName:bet.opponentName;
      bet.payDeadline=now()+172800000;
      const iW=bet.myConfirm===A.myId;
      if(iW){A.wins++;A.streak++;ss('vWins',A.wins);ss('vStreak',A.streak);addAct(`${A.lang==='en'?'You won against':'Du vant mot'} ${esc(bet.opponentName||'?')} — ${bet.amount}kr`,'🏆');}
      else{A.streak=0;ss('vStreak','0');addAct(`${esc(bet.opponentName||'?')} ${A.lang==='en'?'won against you':'vant mot deg'} — ${bet.amount}kr`,'😔');}
    }
  }
}

function computePoolPayments(bet,winningSide){
  const winners=[],losers=[];
  // Include creator
  const cSide=bet.creatorSide;
  if(cSide===winningSide)winners.push({id:bet.creatorId,name:bet.creatorName,vipps:bet.creatorVipps||''});
  else losers.push({id:bet.creatorId,name:bet.creatorName,vipps:bet.creatorVipps||''});
  // Include members
  (bet.members||[]).forEach(m=>{
    if(m.side===winningSide)winners.push({id:m.id,name:m.name,vipps:m.vipps||''});
    else losers.push({id:m.id,name:m.name,vipps:m.vipps||''});
  });
  if(!winners.length||!losers.length)return[];
  const amt=bet.amount||0;
  const totalPot=losers.length*amt;
  const perWinner=totalPot/winners.length;
  const payments=[];
  const wRem=winners.map(w=>({...w,remaining:perWinner}));
  let wi=0;
  losers.forEach(loser=>{
    let rem=amt;
    while(rem>0.01&&wi<wRem.length){
      const w=wRem[wi];
      const pay=Math.min(rem,w.remaining);
      if(pay>0.01){
        payments.push({from:loser.id,fromName:loser.name,to:w.id,toName:w.name,toVipps:w.vipps,amount:Math.round(pay)});
        rem-=pay;w.remaining-=pay;
      }
      if(w.remaining<0.01)wi++;
    }
  });
  return payments;
}

    <button class="btn btn-prim btn-full" style="margin-bottom:12px;background:var(--bld);border:1px solid var(--blb);color:var(--bl)" onclick="document.getElementById('pdw-modal').remove();_doPDW('${bid}','B')">🏆 B: ${esc(b.sideB||'Side B')}</button>

window._doPDW=(bid,winningSide)=>{
  const b=A.myBets.find(x=>x.id===bid);if(!b)return;
  // If re-declaring: undo previous win count for creator
  if(b.winningSide&&b.creatorId===A.myId){
    const prevCreatorWon=b.creatorSide===b.winningSide;
    if(prevCreatorWon&&A.wins>0){A.wins--;ss('vWins',A.wins);}
  }
  b.status='await_payment';b.winningSide=winningSide;b.payDeadline=now()+172800000;
  const payments=computePoolPayments(b,winningSide);
  b.payPairs=payments;
  const memberList=[{id:b.creatorId,name:b.creatorName,side:b.creatorSide,vipps:b.creatorVipps||''},...(b.members||[])];
  (b.members||[]).forEach(m=>{
    const myPayments=payments.filter(p=>p.from===m.id||p.to===m.id);
    send(m.id,{t:'PFV',bid,side:winningSide,payDeadline:b.payDeadline,memberList,myPayments});
  });
  const creatorWon=b.creatorSide===winningSide;
  if(creatorWon){A.wins++;A.streak++;ss('vWins',A.wins);ss('vStreak',A.streak);}
  else{A.streak=0;ss('vStreak','0');}
  gossip({t:'ACT',text:`Gruppe-veddemål avgjort! ${winningSide==='A'?esc(b.sideA||'Side A'):esc(b.sideB||'Side B')} vant! 🎯`,ico:'🎯'});
  notify(creatorWon?'🏆 '+t('n_your_side_won'):'😔 '+t('n_your_side_lost'),b.desc);
  persist();render(true);
};
