    ${isPool?`<div class="pool-bar"><div class="pool-fill" style="width:${ap}%"></div></div><div class="pool-lbl"><span>🅰 ${esc(b.sideA||'A')} ${aT}kr</span><span>${esc(b.sideB||'B')} ${bT}kr 🅱</span></div>`
    :b.sideA&&b.sideB?`<div style="display:flex;gap:6px;margin-top:6px;margin-bottom:4px"><span style="font-size:11px;padding:4px 8px;border-radius:8px;background:var(--gd);border:1px solid var(--gb);color:var(--g)">🅰 ${esc(b.sideA)}${b.creatorSide==='A'?' ✓':''}</span><span style="font-size:11px;padding:4px 8px;border-radius:8px;background:var(--bld);border:1px solid var(--blb);color:var(--bl)">🅱 ${esc(b.sideB)}${b.creatorSide==='B'?' ✓':''}</span></div>`:''}
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:${isPool?'8px':'0'}">
      <div>
        <div style="font-family:'Bebas Neue';font-size:22px;color:var(--g);letter-spacing:1px">${b.amount||0}kr</div>
        <div style="font-size:11px;color:var(--muted)">${esc(b.creatorName)}${pr?` · ⭐${pr}`:''} · ${ago(b.ts)}</div>
        ${b.payMethod?`<div style="font-size:11px;color:var(--a);margin-top:2px">💳 ${esc(b.payMethod)}</div>`:''}
      </div>
      <span class="badge ${b.type==='pool'?'b-blue':b.gameType?'b-orange':'b-green'}">${isPool?mbrs.length+' '+t('in_s'):b.gameType?'🎮 '+(GAMES[b.gameType]?(A.lang==='en'?GAMES[b.gameType].nameEn||GAMES[b.gameType].name:GAMES[b.gameType].name):t('type_game')):t('type_honor')}</span>
    </div>
  </div>`;}

// ════════════════════════════════════════════════
// CREATE BET — 5 steps
// ════════════════════════════════════════════════
function pCreate(){
  const step=A.params.step||1;
  const isGame=!!A.nb.gameType; // game bets skip step 2 (BESKRIV)
  const gameStepMap={1:1,3:2,4:3,5:4}; // internal→visual step for game bets
  const steps=isGame?4:5;
  const visualStep=isGame?(gameStepMap[step]||step):step;
  const bar=`<div class="steps-bar">${Array.from({length:steps},(_,i)=>`<div class="step-dot${i+1<=visualStep?' act':''}"></div>`).join('')}</div>`;
  const stepNamesNormal=[t('step_type'),t('step_desc'),t('step_amt'),t('step_pub'),t('step_conf')];
  const stepNamesGame=[t('step_type'),t('step_amt'),t('step_pub'),t('step_conf')];
  const stepNames=isGame?stepNamesGame:stepNamesNormal;
  const info=`<div style="font-size:10px;color:var(--dim);letter-spacing:2px;font-weight:700;margin-bottom:16px">${stepNames[visualStep-1]||''} · ${visualStep}/${steps}</div>`;

  if(step===1)return`<div class="scr">
    <div class="tbar"><button class="back-btn" onclick="go('feed')">${t('cancel')}</button><div class="pg-title">${t('create_t')}</div></div>
    ${bar}${info}
    <div class="type-grid">
      <div class="type-card${A.nb.type==='honor'?' act':''}" onclick="selType('honor')"><div class="type-ico">🤝</div><div class="type-name">${t('type_honor')}</div><div class="type-desc">${t('type_honor_d')}</div></div>
      <div class="type-card${A.nb.type==='pool'?' act':''}" onclick="selType('pool')"><div class="type-ico">👥</div><div class="type-name">${t('type_pool')}</div><div class="type-desc">${t('type_pool_d')}</div></div>
      <div class="type-card${A.nb.type==='game'?' act':''}" onclick="selType('game')"><div class="type-ico">🎮</div><div class="type-name">${t('type_game')}</div><div class="type-desc">${t('type_game_d')}</div></div>
    </div>
    ${A.nb.type==='honor'?`<div class="info-box">${t('type_honor_info')}</div>`:''}
    ${A.nb.type==='pool'?`<div class="info-box">${t('type_pool_info')}</div>`:''}
    ${A.nb.type==='game'?`<div class="info-box">${t('type_game_info')}</div>`:''}
    <button class="btn btn-prim btn-full" ${!A.nb.type?'disabled':''} onclick="createNext()">${t('next')}</button>
  </div>`;

  if(step===2)return`<div class="scr">
    <div class="tbar"><button class="back-btn" onclick="go('create',{step:1})">${t('back')}</button><div class="pg-title">${t('step_desc')}</div></div>
    ${bar}${info}
    <div class="field"><label class="flbl">${t('desc_lbl')}</label><textarea class="fi" id="cd" rows="3" placeholder="${t('desc_ph')}" oninput="A.nb.desc=this.value">${esc(A.nb.desc||'')}</textarea></div>
    <div class="info-box" style="margin-bottom:12px">${t('sides_info')}</div>
    <div class="field"><label class="flbl">${t('sideA_lbl')}</label><input class="fi" id="csA" placeholder="${t('sideA_ph')}" value="${esc(A.nb.sideA||'')}" oninput="A.nb.sideA=this.value;clearTimeout(A._sideT);A._sideT=setTimeout(()=>render(true),300)"></div>
    <div class="field"><label class="flbl">${t('sideB_lbl')}</label><input class="fi" id="csB" placeholder="${t('sideB_ph')}" value="${esc(A.nb.sideB||'')}" oninput="A.nb.sideB=this.value;clearTimeout(A._sideT);A._sideT=setTimeout(()=>render(true),300)"></div>
    ${A.nb.sideA||A.nb.sideB?`<div class="field"><label class="flbl">${t('choose_your_side')}</label>
      <div style="display:flex;gap:8px">
        <button style="flex:1;padding:12px;border-radius:10px;font-size:13px;font-weight:700;border:1px solid ${A.nb.creatorSide==='A'?'var(--gb)':'var(--b2)'};background:${A.nb.creatorSide==='A'?'var(--gd)':'var(--surf2)'};color:${A.nb.creatorSide==='A'?'var(--g)':'var(--muted)'}" onclick="A.nb.creatorSide='A';render(true)">🅰 ${esc(A.nb.sideA||'Side A')}</button>
        <button style="flex:1;padding:12px;border-radius:10px;font-size:13px;font-weight:700;border:1px solid ${A.nb.creatorSide==='B'?'var(--blb)':'var(--b2)'};background:${A.nb.creatorSide==='B'?'var(--bld)':'var(--surf2)'};color:${A.nb.creatorSide==='B'?'var(--bl)':'var(--muted)'}" onclick="A.nb.creatorSide='B';render(true)">🅱 ${esc(A.nb.sideB||'Side B')}</button>
      </div>
    </div>`:''}
    <div class="field"><label class="flbl">${t('cat_lbl')}</label><div class="chips" style="flex-wrap:wrap">${cats().slice(1).map(c=>`<button class="chip${A.nb.cat===c?' act':''}" onclick="selCat('${c}')">${c}</button>`).join('')}</div></div>
    <button class="btn btn-prim btn-full" onclick="cs2()">${t('next')}</button>
  </div>`;

  if(step===3){
    return`<div class="scr">
    <div class="tbar"><button class="back-btn" onclick="go('create',{step:${isGame?1:2}})">${t('back')}</button><div class="pg-title">${t('step_amt')}</div></div>
    ${bar}${info}
    <div class="field"><label class="flbl">${t('amt_lbl')}</label>
      <div class="fi-row">${[50,100,200,500].map(a=>`<button class="fi-chip${A.nb.amount==a?' act':''}" onclick="selAmt(${a})">${a}</button>`).join('')}</div>
      <input class="fi" id="ca" type="number" max="500" min="1" placeholder="${t('amt_ph')}" value="${A.nb.amount||''}" style="margin-top:8px" oninput="A.nb.amount=Math.min(500,parseInt(this.value)||0)">
    </div>
    <div class="field"><label class="flbl">${t('expiry_lbl')}</label>
      <div class="fi-row">${[[1,t('exp0')],[3,t('exp1')],[7,t('exp2')],[14,t('exp3')]].map(([d,l])=>`<button class="fi-chip${A.nb.expiry==d?' act':''}" onclick="selExp(${d})">${l}</button>`).join('')}</div>
    </div>
    <div class="field"><label class="flbl">${t('pay_lbl')}</label>
      <input class="fi" id="cp" placeholder="${t('pay_ph')}" value="${esc(A.nb.payMethod||'')}" oninput="A.nb.payMethod=this.value">
    </div>
    ${A.nb.type==='pool'?`<div class="field"><label class="flbl">${t('pool_max_per_side')}</label>
      <input class="fi" id="cmps" type="number" min="1" max="50" placeholder="${t('pool_max_ph')}" value="${A.nb.maxPerSide||''}" oninput="A.nb.maxPerSide=parseInt(this.value)||null">
    </div>`:''}
    <button class="btn btn-prim btn-full" onclick="cs3()">${t('next')}</button>
  </div>`;}

  if(step===4){
    const myContacts=A.contacts;
    return`<div class="scr">
    <div class="tbar"><button class="back-btn" onclick="go('create',{step:3})">${t('back')}</button><div class="pg-title">${t('step_pub')}</div></div>
    ${bar}${info}
    <div class="info-box">${t('pub_info')}</div>
    <div class="vis-grid">
      <div class="vis-card${A.nb.visibility==='public'?' act':''}" onclick="selVis('public')">
        <div class="vis-ico">👥</div>
        <div class="vis-name">${t('pub_all')}</div>
        <div class="vis-desc">${t('pub_all_d')}</div>
      </div>
      <div class="vis-card${A.nb.visibility==='private'?' act-lock':''}" onclick="selVis('private')">
        <div class="vis-ico">🎯</div>
        <div class="vis-name">${t('pub_sel')}</div>
        <div class="vis-desc">${t('pub_sel_d')}</div>
      </div>
    </div>
    ${A.nb.visibility==='private'?`
      <div class="section-label">${t('sel_who')}</div>
      ${!myContacts.length?`<div class="warn-box">${t('no_friends_warn')}</div>`:''}
      ${myContacts.map(c=>{const sel=A.inviteSelected.has(c.id);return`<div class="invite-item${sel?' sel':''}" onclick="toggleInvite('${c.id}')">
        <div class="invite-check">${sel?'✓':''}</div>
        <div class="av ${A.conns.get(c.id)?.open?'av-g':''}">${(c.alias||c.name||'?')[0].toUpperCase()}</div>
        <div style="flex:1"><div style="font-size:14px;font-weight:600;color:var(--tx)">${esc(c.alias||c.name)}</div>
        <div style="font-size:11px;color:var(--muted)">${A.conns.get(c.id)?.open?'● Online':'○ Offline'}</div></div>
        <button style="font-size:11px;color:var(--bl);padding:10px 12px;border:1px solid var(--blb);border-radius:8px;background:var(--bld)" onclick="event.stopPropagation();go('repProfile',{uid:'${c.id}',name:'${esc(c.alias||c.name)}'})">${t('rep_btn')}</button>
      </div>`;}).join('')}
      ${A.inviteSelected.size?`<div class="info-box" style="color:var(--g)">✓ ${A.inviteSelected.size} ${t('sel_friends_n')}</div>`:''}
    `:A.nb.visibility==='public'?`<div class="info-box" style="color:var(--g)">✓ ${t('bet_sends_all_pre')} ${A.contacts.length} ${t('bet_sends_all_suf')}</div>`:''}
    <button class="btn btn-prim btn-full" ${!A.nb.visibility?'disabled':''} onclick="go('create',{step:5})">${t('next')}</button>
  </div>`;}

  if(step===5){
    const isPrivate=A.nb.visibility==='private';
    return`<div class="scr">
    <div class="tbar"><button class="back-btn" onclick="go('create',{step:4})">${t('back')}</button><div class="pg-title">${t('step_conf')}</div></div>
    ${bar}${info}
    <div class="card c${A.nb.gameType?'j':A.nb.type==='pool'?'p':A.nb.type==='honor'?'h':isPrivate?'l':'j'}" style="margin-bottom:16px">
      <div class="card-desc">${esc(A.nb.desc)}</div>
      <div class="divider"></div>
      ${[
        A.nb.gameType?[t('conf_type'),'🎮 '+t('type_game')]:A.nb.type==='honor'?[t('conf_type'),'🤝 '+t('type_honor')]:[t('conf_type'),'👥 '+t('type_pool')],
        A.nb.gameType?(()=>{const _gm=GAMES[A.nb.gameType];return[A.lang==='en'?'Game':'Spill',(_gm?.icon||'🎮')+' '+esc(A.lang==='en'?_gm?.nameEn||_gm?.name||A.nb.gameType:_gm?.name||A.nb.gameType)];})():null,
        [t('conf_amt'),A.nb.amount+'kr'],
        A.nb.sideA?[t('conf_sideA'),A.nb.sideA]:null,
        A.nb.sideB?[t('conf_sideB'),A.nb.sideB]:null,
        A.nb.creatorSide&&A.nb.sideA?[t('your_side'),A.nb.creatorSide==='A'?'🅰 '+A.nb.sideA:'🅱 '+A.nb.sideB]:null,
        A.nb.maxPerSide?[t('pool_max_per_side'),A.nb.maxPerSide+' '+(A.lang==='en'?'per side':'per lag')]:null,
        [t('conf_expires'),A.nb.expiry+' '+t('day_s')],
        [t('conf_sends'),isPrivate?`🎯 ${A.inviteSelected.size} ${t('chosen_friends')}`:`👥 ${A.contacts.length} ${t('stat_friends')}`],
        A.nb.payMethod?[t('conf_pay'),A.nb.payMethod]:null,
      ].filter(Boolean).map(([k,v])=>`<div class="drow"><span>${k}</span><span class="dval">${esc(v)}</span></div>`).join('')}
    </div>
    <div class="info-box">${isPrivate?`${t('bet_sends_priv_pre')} ${A.inviteSelected.size} ${t('bet_sends_priv_suf')}`:`${t('bet_sends_all_info')}`} ${t('not_changed')}</div>
    <button class="btn btn-prim btn-full" onclick="doPost()">${t('publish')}</button>
    <button class="btn btn-ghost" onclick="go('feed')">${t('cancel')}</button>
  </div>`;}
}
window.selType=v=>{A.nb.type=v;if(v!=='game'){A.nb.gameType=undefined;A.nb.desc='';A.nb.cat='';}render(true);};
window.createNext=()=>{if(A.nb.type==='game'){go('game',{fromCreate:true});}else{go('create',{step:2});}};
window.selCat=v=>{A.nb.cat=v;render(true);};
window.selAmt=v=>{A.nb.amount=v;render(true);};
window.selExp=v=>{A.nb.expiry=v;render(true);};
window.selVis=v=>{A.nb.visibility=v;if(v==='public')A.inviteSelected.clear();render(true);};
window.toggleInvite=id=>{if(A.inviteSelected.has(id))A.inviteSelected.delete(id);else A.inviteSelected.add(id);render(true);};
window.cs2=()=>{
  const d=($('cd')||{}).value?.trim();if(!d){alert(t('err_enter_desc'));return;}
  A.nb.desc=d;
  A.nb.sideA=($('csA')||{}).value?.trim()||'';
  A.nb.sideB=($('csB')||{}).value?.trim()||'';
  // Pool requires both sides
  if(A.nb.type==='pool'&&(!A.nb.sideA||!A.nb.sideB)){alert(t('err_enter_outcomes'));return;}
  // If sides defined, pool requires side selection; for 1v1 it's optional but nice
  if(A.nb.type==='pool'&&!A.nb.creatorSide){alert(t('err_choose_side'));return;}
  go('create',{step:3});
};
window.cs3=()=>{
  A.nb.amount=Math.min(500,parseInt(($('ca')||{}).value||A.nb.amount||0));
  if(!A.nb.amount){alert(t('err_enter_amount'));return;}
  if(!A.nb.expiry)A.nb.expiry=7;
  A.nb.payMethod=($('cp')||{}).value?.trim()||'';
  A.nb.maxPerSide=parseInt(($('cmps')||{}).value)||null;
  go('create',{step:4});
};
window.doPost=()=>{
  if(A.nb.visibility==='private'&&A.inviteSelected.size===0){alert(t('select_min_one'));return;}
  // Defensive: ensure game bets have auto-filled defaults even if draft state is weird
  if(A.nb.gameType&&!A.nb.desc){const _gm=GAMES[A.nb.gameType];A.nb.desc=(_gm?.icon||'🎮')+' '+(_gm?.name||A.nb.gameType)+' — 1 vs 1';A.nb.cat='🎮 Gaming';}
  const bet={
    id:'b'+now().toString(36)+Math.random().toString(36).substr(2,4),
    desc:A.nb.desc,amount:A.nb.amount,type:A.nb.type==='game'?'honor':A.nb.type,
    category:A.nb.cat||cats()[1],
    sideA:A.nb.sideA,sideB:A.nb.sideB,
    creatorSide:A.nb.creatorSide||null,
    creatorId:A.myId,creatorName:A.myName,creatorVipps:A.myVipps,
    payMethod:A.nb.payMethod,
    isPrivate:A.nb.visibility==='private',
    invitedIds:A.nb.visibility==='private'?[...A.inviteSelected]:null,
    maxPerSide:A.nb.maxPerSide||null,
    gameType:A.nb.gameType||undefined,
    ts:now(),expiresAt:now()+A.nb.expiry*86400000,
    status:'open',members:[],interests:[]
  };
  A.myBets.push({...bet});

  if(A.nb.visibility==='private'){
    // Send kun til valgte venner
    [...A.inviteSelected].forEach(id=>send(id,{t:'INV',bet:{...bet,fromContact:true}}));
    addAct(`${t('bet_sent_to')} ${A.inviteSelected.size} ${t('sel_friends_n')}`,'🔒');
  }else{
    // Send til ALLE kontakter — ikke til fremmede
    const contactIds=A.contacts.map(c=>c.id);
    contactIds.forEach(id=>send(id,{t:'INV',bet:{...bet,fromContact:true}}));
    addAct(`${t('you_posted')} ${(bet.desc||'').substr(0,40)}`,'📋');
  }
  persist();A.nb={};A.inviteSelected.clear();go('mine');
};

// ════════════════════════════════════════════════
// JOIN BET
// ════════════════════════════════════════════════
function pJoinBet(){
  const bet=A.openBets.get(A.params.betId);
  if(!bet)return`<div class="scr"><div class="tbar"><button class="back-btn" onclick="go('feed')">${t('back')}</button></div><div class="empty"><div class="empty-ico">❓</div><div class="empty-tx">${t('bet_not_found')}</div></div></div>`;
  const isPool=bet.type==='pool';const np=npCount(bet.creatorId);const pr=avgRating(bet.creatorId,false);
  return`<div class="scr">
    <div class="tbar"><button class="back-btn" onclick="go('feed')">${t('back')}</button><div class="pg-title">${t('join_t')}</div></div>
    ${np?`<div class="warn-box">⚠️ ${t('np_warn_pre')} ${np} ${t('np_warn_suf')}</div>`:''}
    <div class="card c${bet.type==='pool'?'p':bet.type==='honor'?'h':bet.isPrivate?'l':'j'}" style="margin-bottom:16px">
      <div class="card-desc">${esc(bet.desc)}</div>
      <div class="divider"></div>
      ${[[t('row_from'),bet.creatorName+(pr?` · ⭐${pr}`:'')],[t('stake_lbl'),bet.amount+'kr'],[t('row_type'),bet.type==='honor'?'🤝 '+t('type_honor'):'👥 '+t('type_pool')],!isPool?[t('potential_win'),(bet.amount*2)+'kr']:null,bet.payMethod?[t('settlement'),bet.payMethod]:null].filter(Boolean).map(([k,v])=>`<div class="drow"><span>${k}</span><span class="dval">${esc(v)}</span></div>`).join('')}
    </div>
    <button class="btn btn-sec btn-full" style="margin-bottom:10px" onclick="go('repProfile',{uid:'${bet.creatorId}',name:'${esc(bet.creatorName)}'})">👤 ${t('view_rep_of')} ${esc(bet.creatorName)}</button>
    <div class="info-box">${t('anon_info_pre')} ${esc(bet.creatorName)} ${t('anon_info_suf')}</div>
    ${bet.sideA&&bet.sideB?`<div class="section-label" style="margin-bottom:10px">${isPool?t('choose_side'):t('choose_your_side')}</div>
    ${isPool?`<div style="display:flex;gap:8px;margin-bottom:16px">
      <button style="flex:1;padding:14px;border-radius:12px;font-size:14px;font-weight:700;border:1px solid ${A.nb.side==='A'?'var(--gb)':'var(--b2)'};background:${A.nb.side==='A'?'var(--gd)':'var(--surf2)'};color:${A.nb.side==='A'?'var(--g)':'var(--muted)'}" onclick="selSide('A')">🅰 ${esc(bet.sideA)}</button>
      <button style="flex:1;padding:14px;border-radius:12px;font-size:14px;font-weight:700;border:1px solid ${A.nb.side==='B'?'var(--blb)':'var(--b2)'};background:${A.nb.side==='B'?'var(--bld)':'var(--surf2)'};color:${A.nb.side==='B'?'var(--bl)':'var(--muted)'}" onclick="selSide('B')">🅱 ${esc(bet.sideB)}</button>
    </div>`:`<div style="margin-bottom:16px">
      <div style="padding:14px;border-radius:12px;font-size:14px;border:1px solid var(--gb);background:var(--gd);color:var(--g);margin-bottom:8px">
        <div style="font-size:10px;letter-spacing:1px;opacity:0.7;margin-bottom:4px">${esc(bet.creatorName)} ${t('creator_chose')}:</div>
        <div style="font-weight:700">${bet.creatorSide==='A'?'🅰 '+esc(bet.sideA):'🅱 '+esc(bet.sideB)}</div>
      </div>
      <div style="padding:14px;border-radius:12px;font-size:14px;border:1px solid var(--blb);background:var(--bld);color:var(--bl)">
        <div style="font-size:10px;letter-spacing:1px;opacity:0.7;margin-bottom:4px">${t('your_side')}:</div>
        <div style="font-weight:700">${bet.creatorSide==='A'?'🅱 '+esc(bet.sideB):'🅰 '+esc(bet.sideA)}</div>
      </div>
    </div>`}`:''}
    <button class="btn btn-prim btn-full" onclick="doJoin('${bet.id}','${bet.creatorId}','${bet.type}')" ${isPool&&!A.nb.side?'disabled':''}>${t('join_btn')}</button>
    <button class="btn btn-ghost" onclick="go('feed')">${t('cancel')}</button>
  </div>`;}
window.selSide=s=>{A.nb.side=s;render(true);};
window.doJoin=(betId,cId,type)=>{
  if(type==='pool'&&!A.nb.side){alert(t('choose_side'));return;}
  const bet=A.openBets.get(betId);
  // For 1v1 with sides: auto-assign the opposite side
  let mySide=A.nb.side||null;
  if(type!=='pool'&&bet?.creatorSide&&bet?.sideA&&bet?.sideB){
    mySide=bet.creatorSide==='A'?'B':'A';
  }
  const myBet={id:betId,desc:bet?.desc,amount:bet?.amount,type,category:bet?.category,
    sideA:bet?.sideA,sideB:bet?.sideB,payMethod:bet?.payMethod,opponentId:cId,opponentName:bet?.creatorName,
    gameType:bet?.gameType||undefined,
    status:'pending',isChallenger:true,ts:now(),side:mySide};
  A.myBets.push(myBet);
  if(type==='pool'){
    // Pool: send PJ only — JR is for 1v1 interest tracking, not needed for pool
    send(cId,{t:'PJ',bid:betId,name:A.myName,side:mySide,amt:bet?.amount,vipps:A.myVipps});
    // Also add self to local copy of bet members if we have it
    const openBet=A.openBets.get(betId);
    if(openBet){if(!openBet.members)openBet.members=[];openBet.members.push({id:A.myId,name:A.myName,side:mySide,amt:bet?.amount});}
  }else{
    // 1v1: send JR so creator can choose who to let in
    send(cId,{t:'JR',bid:betId,name:A.myName,vipps:A.myVipps,side:mySide});
  }
  persist();A.nb={};go('mine');
};

    ${list.map(p=>{

      return`<div class="card" style="margin-bottom:10px">

            </div>
          </div>
          ${p.side?`<span class="badge b-blue">${p.side==='A'?'🅰 '+esc(bet.sideA||'A'):'🅱 '+esc(bet.sideB||'B')}</span>`:''}
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-sec" style="flex:1;padding:10px" onclick="go('repProfile',{uid:'${p.id}',name:'${esc(p.name)}'})">${t('rep_btn')}</button>
          ${bet.type!=='pool'?`<button class="btn btn-acc" style="padding:10px" onclick="acceptInterest('${bet.id}','${p.id}','${esc(p.name)}','${esc(p.vipps||'')}')">${t('accept_btn')}</button>`:''}
          <button class="btn btn-dec" style="padding:10px" onclick="declineInterest('${bet.id}','${p.id}')">✗</button>
        </div>
      </div>`;}).join('')}
  </div>`;}
window.acceptInterest=(bid,pid,name,vipps)=>{
  const b=A.myBets.find(x=>x.id===bid);if(!b)return;
  if(b.type==='pool'){b.interests=(b.interests||[]).filter(x=>x.id!==pid);persist();render(true);return;}
  b.opponentId=pid;b.opponentName=name;b.opponentVipps=vipps;
  b.status='active';
  gossip({t:'TAKE',betId:bid});
  send(pid,{t:'JY',bid,name:A.myName,vipps:A.myVipps});
  // Decline all others
  (b.interests||[]).filter(x=>x.id!==pid).forEach(x=>send(x.id,{t:'JN',bid}));
  b.interests=[];persist();go('betDetail',{betId:bid});
};
window.declineInterest=(bid,pid)=>{
  const b=A.myBets.find(x=>x.id===bid);if(!b)return;
  b.interests=(b.interests||[]).filter(x=>x.id!==pid);
  send(pid,{t:'JN',bid});persist();render(true);
};

  if(bet.status==='never_paid')body+=`<div class="never-paid" style="margin-bottom:14px;font-size:14px;display:flex">${t('never_paid_tag')}</div>`;

  body+=chatBtn;

    body+=`<div style="display:flex;gap:8px;margin-top:8px">

  return`<div class="scr">
    <div class="tbar"><button class="back-btn" onclick="go('mine')">${t('back')}</button><div class="pg-title">${t('bet_detail_t')}</div></div>

  </div>`;}

window.cancelBet=bid=>{
  if(!confirm(t('cancel_q')))return;
  const b=A.myBets.find(x=>x.id===bid);if(!b)return;
  b.status='cancelled';A.openBets.delete(bid);gossip({t:'CANCEL',betId:bid});
  persist();render(true);
};
window.leaveBet=bid=>{
  if(!confirm(t('leave_bet_q')))return;
  A.myBets=A.myBets.filter(x=>x.id!==bid);
  A.openBets.delete(bid);
  if(A.betChats[bid])delete A.betChats[bid];
  persist();go('mine');
};
window.deleteBetChat=bid=>{
  if(!confirm(t('delete_chat_q')))return;
  if(A.betChats[bid])delete A.betChats[bid];
  persist();render(true);
};
window.deleteDM=pid=>{
  if(!confirm(t('delete_chat_q')))return;
  if(A.dms[pid])delete A.dms[pid];
  persist();render(true);
};
window.deleteGroupChat=gcId=>{
  if(!confirm(t('delete_chat_q')))return;
  A.groupChats=A.groupChats.filter(g=>g.id!==gcId);
  persist();render(true);
};
window.hConf=(bid,wId)=>{
  const b=A.myBets.find(x=>x.id===bid);if(!b)return;
  b.myConfirm=wId;send(b.opponentId,{t:'HC',bid,wId});checkHonor(b);persist();render(true);
};
window.shareVipps=bid=>{
  const b=A.myBets.find(x=>x.id===bid);if(!b)return;
  b.vippsShared=true;
  if(b.type==='pool'){
    const rcpts=b.isChallenger
      ?(b.opponentId?[b.opponentId]:[])
      :(b.members||[]).filter(m=>m.side!==b.winningSide).map(m=>m.id);
    rcpts.forEach(id=>send(id,{t:'WV',bid,vipps:A.myVipps}));
  }else{
    if(b.opponentId)send(b.opponentId,{t:'WV',bid,vipps:A.myVipps});
  }
  persist();go('betChat',{betId:bid});
};
window.confPayment=bid=>{
  const b=A.myBets.find(x=>x.id===bid);if(!b)return;
  b.status='done';
  if(b.type==='pool'){
    // Collect all other pool member IDs — fall back to memberList/opponentId for joiners
    // (joiner's bet copy lacks creatorId and members, but has memberList and opponentId)
    const allMemberIds=new Set();
    (b.members||[]).forEach(m=>{if(m.id&&m.id!==A.myId)allMemberIds.add(m.id);});
    (b.memberList||[]).forEach(m=>{if(m.id&&m.id!==A.myId)allMemberIds.add(m.id);});
    if(b.creatorId&&b.creatorId!==A.myId)allMemberIds.add(b.creatorId);
    if(b.opponentId&&b.opponentId!==A.myId)allMemberIds.add(b.opponentId);
    allMemberIds.forEach(id=>send(id,{t:'PC',bid}));
  }else{
    if(b.opponentId)send(b.opponentId,{t:'PC',bid});
  }
  persist();render(true);
};
window.doNeverPaid=bid=>{
  if(!confirm(t('never_paid_q')))return;
  const b=A.myBets.find(x=>x.id===bid);if(!b)return;
  b.status='never_paid';
  const loserId=b.opponentId;
  if(loserId){
    if(!A.ratings[loserId])A.ratings[loserId]=[];
    A.ratings[loserId].push({score:1,comment:'Betalte aldri.',betId:bid,raterName:A.myName,ts:now(),neverPaid:true,isJudge:false});
    gossip({t:'RAT',uid:loserId,ratings:A.ratings[loserId]});
  }
  persist();render(true);
};
window.setStar=(key,n)=>{
  A.nb[key]=n;
  render(true);
};
window.doRate=async(bid,loserId)=>{
  const ls_=A.nb.rL||0;if(!ls_){alert(t('rate_missing'));return;}
  const lc=A.nb._rcl||($('rcl')||{}).value?.trim()||'';
  const rateBtn=document.querySelector('[onclick^="doRate"]');
  const rateBtnTxt=rateBtn?.textContent;
  if(rateBtn){rateBtn.disabled=true;rateBtn.textContent='...';}
  try{
    const sig=await signData({bid,loserId,score:ls_,ts:now()});
    if(loserId){
      if(!A.ratings[loserId])A.ratings[loserId]=[];
      A.ratings[loserId].push({score:ls_,comment:lc,betId:bid,raterName:A.myName,ts:now(),neverPaid:false,isJudge:false,sig});
      gossip({t:'RAT',uid:loserId,ratings:A.ratings[loserId]});
    }
    try{A.rated.add(bid);ss('vRated',JSON.stringify([...A.rated]));}catch(e){console.error('[doRate persist]',e);}
    A.nb.rL=0;A.nb._rcl='';notify('⭐ '+t('n_rating_sent'));persist();go('mine');
  }catch(e){
    console.error('[doRate]',e);
    if(rateBtn){rateBtn.disabled=false;rateBtn.textContent=rateBtnTxt||t('rate_btn');}
  }
};

window.dmSend=async(pid)=>{
  const inp=$('dm-in');if(!inp||!inp.value.trim())return;
  const sendBtn=document.querySelector('.chat-send');
  if(sendBtn)sendBtn.disabled=true;
  const raw=inp.value.trim();const peer=A.peers.get(pid);
  let enc=raw;let isEnc=false;
  // SECURITY FIX: Only encrypt with verified ECDH keys; warn on cleartext
  const reEnBtn=()=>{if(sendBtn)sendBtn.disabled=false;};
  if(peer?.epub&&peer?.epubVerified!==false){
    try{const result=await encryptFor(raw,peer.epub);if(result){enc=result;isEnc=true;}else{if(!confirm(t('enc_fail_warn'))){reEnBtn();return;}}}
    catch(e){if(!confirm(t('enc_fail_warn'))){reEnBtn();return;}}
  } else if(peer?.epub&&peer?.epubVerified===false){
    if(!confirm(t('enc_mitm_warn'))){reEnBtn();return;}
  } else {
    if(!confirm(t('enc_missing_warn'))){reEnBtn();return;}
  }
  const dmMid=uid();
  addDM(pid,{from:A.myId,name:A.myName,text:raw,ts:now(),_mid:dmMid});
  send(pid,{t:'DM',name:A.myName,text:enc,enc:isEnc,ts:now(),_mid:dmMid});
  inp.value='';persist();render(true);setTimeout(()=>{const m=$('chat-msgs');if(m)m.scrollTop=m.scrollHeight;},50);
};

function msgTypeLabel(type){

    PC:t('type_payment_lbl'),PA:t('type_msg_lbl'),PFV:t('type_result_lbl'),

    JN:t('type_msg_lbl'),PJ:t('type_msg_lbl')};
  return map[type]||t('type_msg_lbl');
}
function myPendingItems(){
  const seen=new Set();const items=[];
  A.offlineQ.forEach(item=>{
    if(!item.to||item.to===A.myId)return;
    const k=item.mid||('o:'+item.to+':'+item.msg?.t);
    if(!seen.has(k)){seen.add(k);items.push({to:item.to,t:item.msg?.t,mid:item.mid,state:'queued'});}
  });
  A.relayQ.forEach(item=>{
    if(item.from!==A.myId||!item.to)return;
    const k=item.mid;
    if(k&&!seen.has(k)){seen.add(k);items.push({to:item.to,t:item.msg?.t,mid:item.mid,state:'relay'});}
  });
  return items;
}
function betMsgStatus(betId,msgTypes){
  if(A.offlineQ.some(i=>msgTypes.includes(i.msg?.t)&&(i.msg?.bid===betId||i.msg?.bet?.id===betId)))return'queued';
  if(A.relayQ.some(i=>i.from===A.myId&&msgTypes.includes(i.msg?.t)&&(i.msg?.bid===betId||i.msg?.bet?.id===betId)))return'relay';
  return null;
}

// GAME INFRASTRUCTURE — generic V1 built-in game support
// ════════════════════════════════════════════════
const GAMES={};
// Seeded PRNG (mulberry32) — deterministic randomness for game init
function _prngMul32(s){s=s|0;return function(){s=(s+0x6D2B79F5)|0;let t=Math.imul(s^(s>>>15),1|s);t=(t+Math.imul(t^(t>>>7),61|t))^t;return((t^(t>>>14))>>>0)/4294967296;};}
function _prngSeed(str){let h=0;for(let i=0;i<str.length;i++){h=Math.imul(31,h)+str.charCodeAt(i)|0;}return h;}
function _prngShuffle(arr,rng){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(rng()*((i|0)+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

// Game remote action callback — set by pGame, called by GM handler
let _gameRemoteAction=null;

// Game screen — handles two modes: (1) game picker from create flow, (2) active game from bet
function pGame(){
  const gameList=Object.values(GAMES);
  // MODE 1: Game picker (from create flow — no bet yet, or from existing bet)
  if(A.params.fromCreate||A.params.pick||(A.params.betId&&!A.myBets.find(b=>b.id===A.params.betId)?.gameType)){
    const backTarget=A.params.fromCreate?`go('create',{step:1})`:(A.params.betId?`go('betDetail',{betId:'${A.params.betId}'})`:`go('feed')`);
    return`<div class="scr">
      <div class="tbar"><button class="back-btn" onclick="${backTarget}">${t('back')}</button><div class="pg-title">${t('game_pick_title')}</div></div>
      ${!gameList.length?`<div class="empty"><div class="empty-ico">🎮</div><div class="empty-tx">${t('game_no_games')}</div></div>`:''}
      ${gameList.map(g=>`<div class="card card-tap" style="margin-bottom:10px" onclick="pickGame('${g.id}')">
        <div style="display:flex;align-items:center;gap:12px">
          <div style="font-size:32px">${g.icon||'🎮'}</div>
          <div style="flex:1">
            <div style="font-size:15px;font-weight:700;color:var(--tx)">${esc(A.lang==='en'?g.nameEn||g.name:g.name)}</div>
            <div style="font-size:12px;color:var(--muted);margin-top:2px">${esc(A.lang==='en'?g.descriptionEn||g.description:g.description)}</div>
          </div>
          <span style="font-size:16px;color:var(--dim)">→</span>
        </div>
      </div>`).join('')}
    </div>`;
  }
  // MODE 2: Active game on existing bet
  const bet=A.myBets.find(b=>b.id===A.params.betId);
  if(!bet)return`<div class="scr"><div class="tbar"><button class="back-btn" onclick="go('mine')">${t('back')}</button></div><div class="empty"><div class="empty-ico">❓</div><div class="empty-tx">${t('bet_not_found')}</div></div></div>`;
  const gm=GAMES[bet.gameType];
  if(!gm){
    return`<div class="scr">
      <div class="tbar"><button class="back-btn" onclick="go('betDetail',{betId:'${bet.id}'})">${t('back')}</button><div class="pg-title">🎮</div></div>
      <div class="empty"><div class="empty-ico">🎮</div><div class="empty-tx">${t('game_unknown')}</div>
        <button class="btn btn-prim btn-full" style="margin-top:16px" onclick="window.open('${esc(UPDATE_URL)}')">${t('update_now')}</button>
      </div>
    </div>`;
  }
  const oppName=bet.opponentName||dispName(bet.opponentId);
  const myTurn=bet.gameTurn===A.myId;
  return`<div class="scr">
    <div class="tbar"><button class="back-btn" onclick="pauseGame('${bet.id}')">${t('back')}</button><div class="pg-title">${gm.icon||'🎮'} ${esc(A.lang==='en'?gm.nameEn||gm.name:gm.name)}</div></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div style="font-size:13px;color:var(--tx);font-weight:600">${esc(A.myName)} vs ${esc(oppName)}</div>
      <div style="font-size:12px;color:${myTurn?'var(--g)':'var(--muted)'};font-weight:600">${myTurn?t('game_your_turn'):t('game_their_turn')}</div>
    </div>
    <div id="game-container"></div>
  </div>`;
}
window.pickGame=gameType=>{
  if(A.params.fromCreate){
    // Coming from create flow: auto-fill game-bet defaults and skip to INNSATS (step 3)
    const gm=GAMES[gameType];if(!gm)return;
    A.nb.gameType=gameType;A.nb.type='game';
    A.nb.desc=(gm.icon||'🎮')+' '+(A.lang==='en'?gm.nameEn||gm.name:gm.name)+' — 1 vs 1';
    A.nb.cat='🎮 Gaming';
    A.nb.sideA='';A.nb.sideB='';A.nb.creatorSide=null;
    go('create',{step:3}); // skip BESKRIV, go straight to INNSATS
  }else if(A.params.betId){
    // Coming from existing bet: start the game immediately
    startGame(A.params.betId,gameType);
  }
};
window.startGame=(bid,gameType)=>{
  const b=A.myBets.find(x=>x.id===bid);if(!b)return;
  const gm=GAMES[gameType];if(!gm)return;
  b.gameType=gameType;
  b.gameSeed=uid();
  const players=[{id:A.myId,name:A.myName},{id:b.opponentId,name:b.opponentName||'?'}];
  const state=gm.createInitialState({players,seed:b.gameSeed});
  const status=gm.getStatus(state);
  b.gameState=JSON.stringify(gm.serialize(state));
  b.gameTurn=status.currentTurn;
  b.gameFinished=false;b.gameWinnerId=null;b.gameScores=null;
  persist();
  // Send initial game state to opponent
  send(b.opponentId,{t:'GM',bid,gameType,state:b.gameState,seed:b.gameSeed,turn:b.gameTurn,finished:false,winnerId:null,scores:null,_mid:uid(),ts:now()});
  go('game',{betId:bid});
};
window.pauseGame=bid=>{
  _gameRemoteAction=null;
  go('betDetail',{betId:bid});
};
// Mount a game module into #game-container after pGame renders
function _mountGame(bid){
  const c=$('game-container');if(!c)return;
  const bet=A.myBets.find(b=>b.id===bid);if(!bet||!bet.gameType)return;
  const gm=GAMES[bet.gameType];if(!gm)return;
  // Auto-initialize if game not yet started and I am the creator
  if(!bet.gameState&&bet.opponentId&&bet.creatorId===A.myId){
    bet.gameSeed=uid();
    const players=[{id:A.myId,name:A.myName},{id:bet.opponentId,name:bet.opponentName||'?'}];
    const initState=gm.createInitialState({players,seed:bet.gameSeed});
    const initStatus=gm.getStatus(initState);
    bet.gameState=JSON.stringify(gm.serialize(initState));
    bet.gameTurn=initStatus.currentTurn;
    bet.gameFinished=false;bet.gameWinnerId=null;bet.gameScores=null;
    persist();
    send(bet.opponentId,{t:'GM',bid,gameType:bet.gameType,state:bet.gameState,seed:bet.gameSeed,turn:bet.gameTurn,finished:false,winnerId:null,scores:null,_mid:uid(),ts:now()});
    render(true);return; // re-render with initialized state so header updates
  }
  // Joiner waiting for creator to start
  if(!bet.gameState){c.innerHTML=`<div class="info-box" style="text-align:center">${A.lang==='en'?'Waiting for game to start...':'Venter på at spillet starter...'}</div>`;return;}
  // Restore state
  let state;
  try{state=gm.deserialize(JSON.parse(bet.gameState));}catch(e){console.error('[game] deserialize failed',e);return;}
  const status=gm.getStatus(state);
  if(status.finished)return; // game already done — pGame shows static header, no need to mount
  // Action callback: local player completes a move
  const onAction=(action)=>{
    const newState=gm.applyAction(state,action,A.myId);
    if(newState===state)return; // illegal action, no-op
    state=newState;
    const st=gm.getStatus(state);
    bet.gameState=JSON.stringify(gm.serialize(state));
    bet.gameTurn=st.currentTurn;
    if(st.finished){bet.gameFinished=true;bet.gameWinnerId=st.winnerId||null;bet.gameScores=st.scores||null;}
    persist();
    // Send GM to opponent
    send(bet.opponentId,{t:'GM',bid,action,state:bet.gameState,turn:bet.gameTurn,finished:!!st.finished,winnerId:st.winnerId||null,scores:st.scores||null,_mid:uid(),ts:now()});
    // Auto-resolve honor bet on game finish
    if(st.finished&&bet.type==='honor'&&st.winnerId&&bet.opponentId){
      bet.myConfirm=st.winnerId;
      send(bet.opponentId,{t:'HC',bid,wId:st.winnerId});
      checkHonor(bet);
    }
    // Re-render
    if(st.finished){go('betDetail',{betId:bid});}
    else{render(true);}
  };
  // Remote action handler (called by GM handler when opponent moves)
  _gameRemoteAction=(action,from,remoteState)=>{
    try{
      const applied=gm.applyAction(state,action,from);
      // Use remote state as fallback if local apply diverges
      if(remoteState){try{state=gm.deserialize(JSON.parse(remoteState));}catch(e){state=applied;}}
      else{state=applied;}
    }catch(e){if(remoteState){try{state=gm.deserialize(JSON.parse(remoteState));}catch(e2){}}}
    const st=gm.getStatus(state);
    bet.gameState=JSON.stringify(gm.serialize(state));
    bet.gameTurn=st.currentTurn;
    if(st.finished){bet.gameFinished=true;bet.gameWinnerId=st.winnerId||null;bet.gameScores=st.scores||null;}
    persist();
    if(st.finished){go('betDetail',{betId:bid});}
    else{render(true);}
  };
  // Render the game
  gm.render(c,state,A.myId,{onAction});
}

GAMES['memo']={

  createInitialState({players,seed}){
    const symbols=['🍎','🍊','🍋','🍇','🍓','🍒','🥝','🍑','🫐'];
    const rng=_prngMul32(_prngSeed(seed));
    const board=_prngShuffle([...symbols,...symbols],rng).map(s=>({s,m:false}));
    return{board,p:[{id:players[0].id,name:players[0].name,sc:0},{id:players[1].id,name:players[1].name,sc:0}],turn:players[0].id,last:null};
  },

  applyAction(state,action,playerId){
    if(action.type!=='pair')return state;
    if(playerId!==state.turn)return state;
    const{a,b}=action;
    if(a===b||a<0||b<0||a>=state.board.length||b>=state.board.length)return state;
    if(state.board[a].m||state.board[b].m)return state;
    const board=state.board.map((t,i)=>i===a||i===b?{...t}:{...t});
    const isMatch=board[a].s===board[b].s;
    if(isMatch){board[a].m=true;board[b].m=true;}
    const p=state.p.map(x=>x.id===playerId&&isMatch?{...x,sc:x.sc+1}:{...x});
    const nextTurn=isMatch?playerId:(state.p[0].id===playerId?state.p[1].id:state.p[0].id);
    return{board,p,turn:nextTurn,last:{a,b,match:isMatch,by:playerId}};
  },

  getLegalActions(state,playerId){
    if(playerId!==state.turn)return[];
    const open=state.board.map((t,i)=>t.m?-1:i).filter(i=>i>=0);
    if(open.length<2)return[];
    const actions=[];
    for(let i=0;i<open.length;i++)for(let j=i+1;j<open.length;j++)actions.push({type:'pair',a:open[i],b:open[j]});
    return actions;
  },

  getStatus(state){
    const allMatched=state.board.every(t=>t.m);
    const scores={};state.p.forEach(x=>{scores[x.id]=x.sc;});
    if(allMatched){
      const sorted=[...state.p].sort((a,b)=>b.sc-a.sc);
      return{finished:true,winnerId:sorted[0].sc>sorted[1].sc?sorted[0].id:null,currentTurn:null,scores};
    }
    return{finished:false,winnerId:null,currentTurn:state.turn,scores};
  },

  render(container,state,myId,{onAction}){
    const myTurn=state.turn===myId;
    const me=state.p.find(x=>x.id===myId);
    const opp=state.p.find(x=>x.id!==myId);
    let firstPick=null;
    const drawBoard=()=>{
      const last=state.last;
      const showA=last&&!last.match?last.a:-1;
      const showB=last&&!last.match?last.b:-1;
      let html=`<div style="display:flex;justify-content:space-between;margin-bottom:14px">
        <div style="font-size:14px;font-weight:700;color:${myTurn?'var(--g)':'var(--muted)'}">${esc(me?.name||'Du')}: ${me?.sc||0}</div>
        <div style="font-size:14px;font-weight:700;color:${!myTurn?'var(--bl)':'var(--muted)'}">${esc(opp?.name||'?')}: ${opp?.sc||0}</div>
      </div>`;
      html+=`<div style="display:grid;grid-template-columns:repeat(6,1fr);gap:6px">`;
      state.board.forEach((tile,i)=>{
        const matched=tile.m;
        const revealed=matched||i===firstPick||i===showA||i===showB;
        const isFirst=i===firstPick;
        const canTap=myTurn&&!matched&&firstPick!==i&&firstPick===null?true:(myTurn&&!matched&&firstPick!==null&&firstPick!==i);
        html+=`<div onclick="window._memoTap(${i})" style="aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:10px;font-size:20px;cursor:${(myTurn&&!matched)?'pointer':'default'};
          background:${matched?'var(--gd)':revealed?'var(--surf2)':'var(--surf)'};
          border:2px solid ${isFirst?'var(--g)':matched?'var(--gb)':'var(--b)'};
          opacity:${matched?'0.5':'1'};
          user-select:none;-webkit-user-select:none">${revealed?tile.s:'?'}</div>`;
      });
      html+=`</div>`;
      if(last&&!last.match&&(showA>=0||showB>=0)){
        html+=`<div style="font-size:11px;color:var(--muted);text-align:center;margin-top:10px">${esc(state.p.find(x=>x.id===last.by)?.name||'?')} — ${A.lang==='en'?'no match':'ikke par'}</div>`;
      }
      if(last&&last.match){
        html+=`<div style="font-size:11px;color:var(--g);text-align:center;margin-top:10px">${esc(state.p.find(x=>x.id===last.by)?.name||'?')} — ${A.lang==='en'?'match!':'par! ✓'}</div>`;
      }
      container.innerHTML=html;
    };
    window._memoTap=(i)=>{
      if(!myTurn||state.board[i].m)return;
      if(firstPick===null){
        firstPick=i;drawBoard();
      }else if(firstPick!==i){
        const a=firstPick,b=i;
        firstPick=null;
        onAction({type:'pair',a,b});
      }
    };
    drawBoard();
  },

  serialize(state){return state;},
  deserialize(data){return data;}
};

// SEQUENCE MEMORY — second built-in game (3×3 board, fair rounds)
// Levels: 4 → 5 → 6 (capped). 3 full rounds per level. Each round = 2 legs (both players repeat once).
// ════════════════════════════════════════════════
GAMES['sequence']={
  id:'sequence',
  name:'Sekvens',nameEn:'Sequence',
  icon:'🔢',
  description:'Husk rekkefølgen! Rettferdig: begge gjentar like mange ganger.',
  descriptionEn:'Remember the order! Fair: both players repeat equally.',
  minPlayers:2,maxPlayers:2,estimatedMinutes:10,

  // State shape:
  // size:9, level:4-6, roundAtLevel:0-2 (0-indexed), leg:'a'|'b',
  // phase:'create'|'replay', turn, creator, repeater,
  // seq, p:[{id,name,sc}], finished, winnerId, lastResult,
  // firstPlayer (who was P1 at game start — leg A creator at each round)

  createInitialState({players,seed}){
    return{
      size:9,level:4,
      roundAtLevel:0, // 0,1,2 = three rounds per level
      leg:'a', // 'a' = firstPlayer creates, 'b' = secondPlayer creates
      phase:'create',
      turn:players[0].id,
      creator:players[0].id,
      repeater:players[1].id,
      seq:null,
      p:[{id:players[0].id,name:players[0].name,sc:0},{id:players[1].id,name:players[1].name,sc:0}],
      firstPlayer:players[0].id, // anchor for round structure
      finished:false,winnerId:null,
      lastResult:null
    };
  },

  applyAction(state,action,playerId){
    if(state.finished)return state;
    if(action.type==='set_sequence'){
      if(state.phase!=='create'||playerId!==state.creator)return state;
      if(!Array.isArray(action.seq)||action.seq.length!==state.level)return state;
      if(action.seq.some(i=>i<0||i>=state.size))return state;
      return{...state,seq:action.seq,phase:'replay',turn:state.repeater};
    }
    if(action.type==='attempt'){
      if(state.phase!=='replay'||playerId!==state.repeater||!state.seq)return state;
      if(!Array.isArray(action.seq)||action.seq.length!==state.level)return state;
      if(action.seq.some(i=>i<0||i>=state.size))return state;
      const success=state.seq.every((v,i)=>v===action.seq[i]);
      // Award point: success → repeater gets 1pt, fail → creator gets 1pt
      const p=state.p.map(x=>{
        if(success&&x.id===state.repeater)return{...x,sc:x.sc+1};
        if(!success&&x.id===state.creator)return{...x,sc:x.sc+1};
        return{...x};
      });
      const lr={success,by:playerId};
      const fp=state.firstPlayer;
      const sp=state.p.find(x=>x.id!==fp).id;
      // Determine next state after this leg
      if(state.leg==='a'){
        // Leg A done → start leg B (swap roles, same level, same roundAtLevel)
        return{...state,seq:null,phase:'create',leg:'b',
          turn:sp,creator:sp,repeater:fp,p,lastResult:lr};
      }else{
        // Leg B done → full round complete. Check progression.
        const nextRound=state.roundAtLevel+1;
        const ROUNDS_PER_LEVEL=3;
        const MAX_LEVEL=6;
        if(nextRound<ROUNDS_PER_LEVEL&&state.level<MAX_LEVEL){
          // More rounds at this level
          return{...state,seq:null,phase:'create',leg:'a',roundAtLevel:nextRound,
            turn:fp,creator:fp,repeater:sp,p,lastResult:lr};
        }
        if(nextRound>=ROUNDS_PER_LEVEL&&state.level<MAX_LEVEL){
          // Advance to next level
          return{...state,seq:null,phase:'create',leg:'a',level:state.level+1,roundAtLevel:0,
            turn:fp,creator:fp,repeater:sp,p,lastResult:lr};
        }
        // At level 6: check if we have a winner after this completed round
        const s0=p[0].sc,s1=p[1].sc;
        if(nextRound>=ROUNDS_PER_LEVEL&&s0!==s1){
          // Winner exists after required rounds at level 6
          return{...state,seq:null,phase:'create',p,finished:true,
            winnerId:s0>s1?p[0].id:p[1].id,lastResult:lr};
        }
        // Level 6 but still tied or haven't completed required rounds — continue
        return{...state,seq:null,phase:'create',leg:'a',roundAtLevel:nextRound,
          turn:fp,creator:fp,repeater:sp,p,lastResult:lr};
      }
    }
    return state;
  },

  getLegalActions(state,playerId){
    if(state.finished)return[];
    if(state.phase==='create'&&playerId===state.creator)return[{type:'set_sequence',seq:'*'}];
    if(state.phase==='replay'&&playerId===state.repeater)return[{type:'attempt',seq:'*'}];
    return[];
  },

  getStatus(state){
    const scores={};state.p.forEach(x=>{scores[x.id]=x.sc;});
    if(state.finished)return{finished:true,winnerId:state.winnerId,currentTurn:null,scores};
    return{finished:false,winnerId:null,currentTurn:state.turn,scores};
  },

  render(container,state,myId,{onAction}){
    const myTurn=state.turn===myId;
    const amCreator=state.phase==='create'&&state.creator===myId;
    const amRepeater=state.phase==='replay'&&state.repeater===myId;

    const drawUI=()=>{
      let html='';
      const levelTxt=en?`Length ${state.level}`:`Lengde ${state.level}`;
      const isExtra=state.level===6&&state.roundAtLevel>=3;
      const roundTxt=isExtra?(en?'Tiebreak':'Ekstra runde'):(en?`Round ${state.roundAtLevel+1}/3`:`Runde ${state.roundAtLevel+1}/3`);
      const legTxt=state.leg==='a'?(en?'Leg A':'Del A'):(en?'Leg B':'Del B');
      let instrTxt='';
      if(state.finished){
        instrTxt=(state.winnerId===myId)?(en?'You won!':'Du vant!'):(en?'You lost':'Du tapte');
      }else if(amCreator){
        instrTxt=en?`Tap ${state.level} tiles to create a sequence`:`Trykk ${state.level} ruter for å lage en sekvens`;
      }else if(amRepeater){
        instrTxt=en?'Repeat the sequence!':'Gjenta sekvensen!';
      }else if(state.phase==='create'){
        instrTxt=en?`${esc(opp?.name||'?')} is creating...`:`${esc(opp?.name||'?')} lager sekvens...`;
      }else{
        instrTxt=en?`${esc(opp?.name||'?')} is repeating...`:`${esc(opp?.name||'?')} gjentar...`;
      }

      // Score bar
      html+=`<div style="display:flex;justify-content:space-between;margin-bottom:10px">
        <div style="font-size:14px;font-weight:700;color:${myTurn?'var(--g)':'var(--muted)'}">${esc(me?.name||'Du')}: ${me?.sc||0}</div>
        <div style="font-size:14px;font-weight:700;color:${!myTurn?'var(--bl)':'var(--muted)'}">${esc(opp?.name||'?')}: ${opp?.sc||0}</div>
      </div>`;
      // Level / round info
      html+=`<div style="text-align:center;margin-bottom:14px">
        <div style="font-size:14px;font-weight:700;color:var(--g);margin-bottom:2px">${levelTxt}</div>
        <div style="font-size:11px;color:var(--muted)">${roundTxt} · ${legTxt}</div>

      </div>`;
      // Last result
      if(state.lastResult&&!state.finished){
        const who=state.p.find(x=>x.id===state.lastResult.by);
        html+=`<div style="font-size:11px;text-align:center;margin-bottom:10px;color:${state.lastResult.success?'var(--g)':'var(--r)'}">${esc(who?.name||'?')} — ${state.lastResult.success?(en?'correct! ✓':'riktig! ✓'):(en?'wrong ✗':'feil ✗')}</div>`;
      }
      // Board (3x3)
      html+=`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:280px;margin:0 auto">`;

      }
      html+=`</div>`;
      if((amCreator||amRepeater)&&!state.finished){
        html+=`<div style="text-align:center;margin-top:12px;font-size:12px;color:var(--muted)">${taps.length} / ${state.level}</div>`;
      }
      if((amCreator||amRepeater)&&taps.length===state.level){
        const btnLabel=amCreator?(en?'Submit sequence':'Send sekvens'):(en?'Submit answer':'Send svar');
        html+=`<button class="btn btn-prim btn-full" style="margin-top:14px;max-width:280px;margin-left:auto;margin-right:auto" onclick="window._seqSubmit()">${btnLabel}</button>`;
      }
      if((amCreator||amRepeater)&&taps.length>0){
        html+=`<button class="btn btn-sec" style="margin-top:10px;max-width:280px;margin-left:auto;margin-right:auto;display:block;font-size:12px" onclick="window._seqUndo()">↩ ${en?'Undo':'Angre'}</button>`;
      }
      if(amRepeater&&state.seq){
        html+=`<div style="text-align:center;margin-top:16px"><button class="btn btn-sec" style="font-size:12px;display:inline-block" onclick="window._seqShowReplay()">👁 ${en?'Show sequence again':'Vis sekvensen igjen'}</button></div>`;
      }
      container.innerHTML=html;
    };

    window._seqTap=(i)=>{if(state.finished||(!amCreator&&!amRepeater)||taps.length>=state.level)return;taps.push(i);drawUI();};

    window._seqSubmit=()=>{
      if(taps.length!==state.level)return;
      if(amCreator)onAction({type:'set_sequence',seq:[...taps]});
      else if(amRepeater)onAction({type:'attempt',seq:[...taps]});
      taps=[];
    };
    window._seqShowReplay=()=>{
      if(!state.seq)return;
      const tiles=container.querySelectorAll('[onclick^="window._seqTap"]');
      let delay=0;
      state.seq.forEach((idx,step)=>{
        setTimeout(()=>{const tile=tiles[idx];if(!tile)return;
          tile.style.background='var(--gd)';tile.style.borderColor='var(--g)';tile.style.color='var(--g)';tile.textContent=''+(step+1);
          setTimeout(()=>{tile.style.background='var(--surf)';tile.style.borderColor='var(--b)';tile.style.color='var(--dim)';tile.textContent='·';},600);
        },delay);delay+=800;
      });
    };
    drawUI();
    if(amRepeater&&state.seq){setTimeout(()=>{window._seqShowReplay();},400);}
  },

  serialize(state){return state;},
  deserialize(data){return data;}
};

  serialize(state){return state;},
  deserialize(data){return data;}
};
// Connect Four win check helper (4 in a row from last placed piece)
function _c4Check(board,row,col,pid){
  const dirs=[[0,1],[1,0],[1,1],[1,-1]]; // horizontal, vertical, diag-down-right, diag-down-left
  for(const[dr,dc]of dirs){
    let count=1;
    for(let d=1;d<=3;d++){const r=row+dr*d,c=col+dc*d;if(r<0||r>=6||c<0||c>=7||board[r][c]!==pid)break;count++;}
    for(let d=1;d<=3;d++){const r=row-dr*d,c=col-dc*d;if(r<0||r>=6||c<0||c>=7||board[r][c]!==pid)break;count++;}
    if(count>=4)return true;
  }
  return false;
}

// ════════════════════════════════════════════════
// STATE REPAIR + MAINTENANCE
// ════════════════════════════════════════════════
function repairState(){
  let changed=false;
  A.myBets.forEach(b=>{
    // 1v1 active without opponentId → revert to open
    if(b.status==='active'&&b.type==='honor'&&!b.opponentId){b.status='open';changed=true;console.warn('[repairState] active honor without opponent → open',b.id);}
    // await_payment without winner info → revert to active
    if(b.status==='await_payment'&&b.type==='honor'&&!b.winnerId){b.status='active';changed=true;console.warn('[repairState] await_payment honor without winnerId → active',b.id);}
    if(b.status==='await_payment'&&b.type==='pool'&&!b.winningSide){b.status='active';changed=true;console.warn('[repairState] await_payment pool without winningSide → active',b.id);}
  });
  if(changed)persist();
}
function cleanOldChats(){
  const cutoff=now()-7776000000; // 90 days in ms
  let cleaned=false;
  Object.keys(A.betChats).forEach(k=>{
    if(k.endsWith('_delReq'))return;
    if(Array.isArray(A.betChats[k])){
      const before=A.betChats[k].length;
      A.betChats[k]=A.betChats[k].filter(m=>(m.ts||0)>cutoff);
      if(A.betChats[k].length!==before)cleaned=true;
    }
  });
  Object.keys(A.dms).forEach(pid=>{
    if(Array.isArray(A.dms[pid])){
      const before=A.dms[pid].length;
      A.dms[pid]=A.dms[pid].filter(m=>(m.ts||0)>cutoff);
      if(A.dms[pid].length!==before)cleaned=true;
    }
  });
  A.groupChats.forEach(g=>{
    if(Array.isArray(g.msgs)){
      const before=g.msgs.length;
      g.msgs=g.msgs.filter(m=>(m.ts||0)>cutoff);
      if(g.msgs.length!==before)cleaned=true;
    }
  });
  pruneRelayQ();
  if(cleaned)persist();
}
function lsUsage(){
  try{
    let total=0;
    for(const k in localStorage){if(Object.prototype.hasOwnProperty.call(localStorage,k))total+=(localStorage.getItem(k)||'').length+k.length;}
    return(total*2/1048576).toFixed(1); // UTF-16 × 2 bytes → MB
  }catch(e){return'?';}
}

// ════════════════════════════════════════════════
// BOOT
// ════════════════════════════════════════════════
async function boot(){
  loadState();
  repairState();
  cleanOldChats();
  // Auto-friend: only for brand-new users opening a shared file
  if(!ls('vPriv')){
    const invId=document.body.dataset.inviter;
    const invName=document.body.dataset.inviterName;
    if(invId&&invId.startsWith('v'))A._pendingInviter={id:invId,name:invName||invId.substr(0,8)};
  }
  // Auto-friend via URL — check query param ?ref=vXXX (reliable on iOS) and hash #vXXX (fallback)
  const urlParams=new URLSearchParams(window.location.search);
  const refParam=urlParams.get('ref')||'';
  const hashId=(window.location.hash||'').replace('#','');
  const inviteId=(refParam.startsWith('v')&&refParam.length>=8)?refParam:(hashId.startsWith('v')&&hashId.length>=8)?hashId:'';
  if(inviteId){
    console.log('[invite] detected invite ID:',inviteId,'source:',refParam?'query-param':'hash');
    history.replaceState(null,'',window.location.pathname); // clean URL
    if(!ls('vPriv')){
      if(!A._pendingInviter)A._pendingInviter={id:inviteId,name:'Venn'};
      console.log('[invite] new user — stored pending inviter:',inviteId);
    }else if(A.myName){
      A._hashInviteId=inviteId;
      console.log('[invite] existing user — will offer to add:',inviteId);
    }
  }
  if(A.myName){
    try{await initCrypto();}catch(e){console.error('[boot/initCrypto]',e);}
    initPeer();
    const nav=$('nav-bar');if(nav)nav.style.display='flex';
    go('feed');
    setTimeout(showInstallHint,1500);
    // Offer to add hash-invite contact for existing users
    if(A._hashInviteId){
      const hid=A._hashInviteId;A._hashInviteId=null;
      setTimeout(()=>{if(!A.contacts.find(c=>c.id===hid)&&confirm(t('hash_friend_q'))){A.contacts.push({id:hid,name:hid.substr(0,12),alias:hid.substr(0,12)});persist();tryConn(hid);notify('👋 '+t('add_id_ok'));}},800);
    }
  }else{
    go(ls('vSeen')?'setup':'onboarding');
    ss('vSeen','1');
  }
  setInterval(()=>{
    try{A.openBets.forEach((b,id)=>{if(b.expiresAt&&b.expiresAt<now())A.openBets.delete(id);});pruneRelayQ();schedRender();}
    catch(e){console.error('[cleanup interval]',e);}
  },300000);
  // Bug 1 fix: periodic health check — restart reconnect loop if peer is stuck disconnected
  setInterval(()=>{if(A.myName&&A.peer&&!A.ready&&!A.peer.destroyed)schedReconnect();},30000);
  // Re-sync + update check when app returns from background
  document.addEventListener('visibilitychange',()=>{
    if(!document.hidden&&A.myName){
      console.log('[visibility] app foregrounded — ready=',A.ready,'conns=',A.conns.size);
      // If peer disconnected while in background, reconnect immediately
      if(A.peer&&A.peer.disconnected&&!A.peer.destroyed){
        A.ready=false;
        try{A.peer.reconnect();}catch(e){}
      }
      schedRender();
      // Wave 1: immediate tryConn (works if signaling is still alive)
      A.contacts.forEach(c=>tryConn(c.id));
      flushQ();
      checkForUpdate();
      // Wave 2: retry after signaling likely reconnected (2s)
      setTimeout(()=>{A.contacts.forEach(c=>tryConn(c.id));flushQ();},2000);
      // Wave 3: retry + full sync after signaling reconnected (5s)
      setTimeout(()=>{A.contacts.forEach(c=>tryConn(c.id));A.conns.forEach((_,id)=>{deliverRelay(id);syncWithPeer(id);});flushQ();schedRender();},5000);
    }
  });
  // Check for updates (silent, non-blocking)
  checkForUpdate();
  setInterval(()=>checkForUpdate(),3600000);
}

window.shareFile = async () => {
  document.getElementById('share-modal')?.remove();
  try{
    // Build HTML from live DOM — no fetch needed, works on file:// too
    let html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
    // Bake in inviter ID so recipient gets auto-friended (new users only)
    html = html.replace(/(<body\b)/, `$1 data-inviter="${A.myId}" data-inviter-name="${esc(A.myName||'')}"`);
    const blob = new Blob([html],{type:'text/html'});
    const file = new File([blob],'veddemal.html',{type:'text/html'});
    if(navigator.share && navigator.canShare?.({files:[file]})){
      await navigator.share({title:'VEDDEMÅL',text:t('share_file_msg'),files:[file]});
      return;
    }
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'veddemal.html';
    a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href),5000);
    notify('📁 '+t('share_downloaded'));
  }catch(e){ if(e.name!=='AbortError') notify('❌ '+t('share_err')); }
};

// ════════════════════════════════════════════════
// PWA — MANIFEST + APPLE-TOUCH-ICON (inline, no external files)
// ════════════════════════════════════════════════
(function(){
  try{
    // Generate icon via canvas: dark bg + green "V"
    const sz=512,c=document.createElement('canvas');c.width=c.height=sz;
    const ctx=c.getContext('2d');
    // Background rounded rect
    ctx.fillStyle='#06060b';
    ctx.beginPath();
    if(ctx.roundRect)ctx.roundRect(0,0,sz,sz,sz*0.18);
    else{const r=sz*0.18;ctx.moveTo(r,0);ctx.lineTo(sz-r,0);ctx.quadraticCurveTo(sz,0,sz,r);ctx.lineTo(sz,sz-r);ctx.quadraticCurveTo(sz,sz,sz-r,sz);ctx.lineTo(r,sz);ctx.quadraticCurveTo(0,sz,0,sz-r);ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);ctx.closePath();}
    ctx.fill();
    // Green glow circle
    const grd=ctx.createRadialGradient(sz/2,sz/2,sz*0.05,sz/2,sz/2,sz*0.45);
    grd.addColorStop(0,'rgba(0,255,136,0.18)');grd.addColorStop(1,'rgba(0,255,136,0)');
    ctx.fillStyle=grd;ctx.fillRect(0,0,sz,sz);
    // Letter V
    ctx.fillStyle='#00ff88';ctx.font=`bold ${sz*0.72}px 'Arial Black',sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('V',sz/2,sz*0.52);
    const png=c.toDataURL('image/png');
    // Apple touch icon
    const al=document.createElement('link');al.rel='apple-touch-icon';al.href=png;document.head.appendChild(al);
    // Web app manifest
    const manifest={name:'Veddemål',short_name:'Veddemål',start_url:'.',display:'standalone',orientation:'portrait',background_color:'#06060b',theme_color:'#00ff88',icons:[{src:png,sizes:'512x512',type:'image/png',purpose:'any maskable'}]};
    const blob=new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'});
    const ml=document.createElement('link');ml.rel='manifest';ml.href=URL.createObjectURL(blob);document.head.appendChild(ml);
  }catch(e){console.warn('[PWA]',e);}
})();

// ════════════════════════════════════════════════
// SERVICE WORKER (inline via Blob URL)
// ════════════════════════════════════════════════
(function(){
  if(!('serviceWorker' in navigator)||location.protocol==='file:')return;
  const CACHE='veddemal-'+APP_VERSION;
  const swCode=`
const CACHE='${CACHE}';
self.addEventListener('install',e=>{
  self.skipWaiting();
});
self.addEventListener('activate',e=>{
  e.waitUntil(
    caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k))))
    .then(()=>self.clients.claim())
  );
});
self.addEventListener('message',e=>{
  if(e.data&&e.data.type==='CACHE_URL'){
    caches.open(CACHE).then(c=>c.add(e.data.url)).catch(()=>{});
  }
});
self.addEventListener('fetch',e=>{
  const url=e.request.url;
  if(url.includes('version.json')||url.includes('fonts.googleapis')||url.includes('fonts.gstatic')||url.includes('unpkg.com'))return;
  e.respondWith(
    caches.match(e.request).then(cached=>{
      if(cached)return cached;
      return fetch(e.request).then(resp=>{
        if(resp&&resp.status===200){
          const clone=resp.clone();
          caches.open(CACHE).then(c=>c.put(e.request,clone)).catch(()=>{});
        }
        return resp;
      }).catch(()=>caches.match(e.request).then(c=>c||new Response('Offline',{status:503})));
    })
  );
});
`;
  try{
    const blob=new Blob([swCode],{type:'application/javascript'});
    const swUrl=URL.createObjectURL(blob);
    const scope=location.href.replace(/[?#].*/,'').replace(/[^/]*$/,'');
    navigator.serviceWorker.register(swUrl,{scope}).then(reg=>{
      const pageUrl=location.href.replace(/[?#].*/,'');
      const send=()=>{
        const sw=reg.active||reg.installing||reg.waiting;
        if(sw)sw.postMessage({type:'CACHE_URL',url:pageUrl});
      };
      if(navigator.serviceWorker.controller)send();
      else navigator.serviceWorker.addEventListener('controllerchange',send,{once:true});
    }).catch(e=>console.warn('[SW]',e));
  }catch(e){console.warn('[SW]',e);}
})();

boot();
